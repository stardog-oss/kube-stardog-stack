# The namespace for Stardog resources that override the release namespace
#namespace: stardog-ns

stardog:
  enabled: true

  licenseServer:
    enabled: false
    licenseType: unlimited
    url: ""

  #stardogLicenseKeyPath: ""
  stardogCloudType: ""

  cluster:
    enabled: false
    replicaCount: 1

  # How to start the pods - use OrderedReady to use the default behavior of
  # starting each pod one at a time or use Parallel to start them all at once
  podManagementPolicy: OrderedReady

  # The number of seconds to wait for pods to shutdown before
  # killing them forcefully
  terminationGracePeriodSeconds: 300

  # Java Virtual Machine memory parameters to pass to stardog.
  jvm:
    minHeap: 1g
    maxHeap: 1g
    directMem: 2g

  # Additional Java Virtual Machine arguments to pass to stardog
  javaArgs: ""

  service:
    type: ClusterIP
    annotations: {}

  bi:
    enabled: false


  # The server port is the port to expose the Stardog server
  # The sql port is the port to expose Stardog's business intelligence server
  ports:
    server: 5820
    sql: 5806

  ssl:
    enabled: false

  tmpDir: /tmp

  # The initial password for the Stardog admin user
  admin:
    password: admin


  image:
    registry: stardog.azurecr.io
    repository: sa-lab-stardog/stardog
    # Alternative config to pull from Stardog private repository
    # registry: stardog-eps-docker.jfrog.io
    # repository: stardog-eps-docker.jfrog.io/stardog
    tag: latest
    pullPolicy: IfNotPresent
    # Request user credentiasl to Stardog team.
    # username:
    # password:
    pullSecrets: []

  # The storage class and size to use for Stardog home volumes for the pods
  persistence:
    storageClass: ""
    annotations: {}
    size: 10Gi

  nodeSelector: {}
  tolerations: []
  #  - key: key1
  #    value: value1
  #    effect: NoSchedule

  antiAffinity: requiredDuringSchedulingIgnoredDuringExecution

  resources:
    requests:
      cpu: 1
      memory: 1Gi
    limits:
      cpu: 2
      memory: 2Gi

  # Dump the json formated Stardog audit log to the console of a side car container console
  # The container will be named {{ .Release.Name }}-stardog-auditlog
  enableAuditSidecar: false

  # these allow you to configure the UID and group ID used by the container when it's running, and the fsGroup sets the group id for the volume-mounts
  # if enabled: false, then the whole block is skipped
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    #fsGroup: 1000

  log4jConfig:
    override: false
    # we provide a default log4j2.xml, if you want to provide your own. in your own values.yaml, set log4Config.override: true, and log4Config.content
    content: |-


  # Stardog liveness probe settings. Consider increasing initialDelaySeconds on clouds where
  # storage provisioning is slower. It is not generally required to modify periodSeconds and timeoutSeconds.
  livenessProbe:
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 15

  # Stardog readiness probe settings. Consider increasing initialDelaySeconds when using nodes with
  # K8S nodes with limited CPUs. It is not generally required to modify periodSeconds and timeoutSeconds.
  readinessProbe:
    initialDelaySeconds: 90
    periodSeconds: 5
    timeoutSeconds: 3

  stardogProperties: |
    pack.node.join.retry.count=15
    pack.node.join.retry.delay=1m

  tls:
    enabled: false
    internal:
      enabled: false
      secretName: "tls-secret-internal-stardog"

  certificateManager:
    enabled: false
    duration: 2160h # 90d
    renewBefore: 360h # 15d
    email: ""
    commonName: ""
    dnsNames: []
    issuerRef:
      name: letsencrypt-staging # or letsencrypt-production for the production issuer

  route:
    enabled: false
    domain: ""

  ingress:
    enabled: false
    className: "nginx" # Example ingress class name
    url: "sparql.stardogcloud.com"
    path: "/"
    pathType: "Prefix"
    annotations:
      nginx.ingress.kubernetes.io/proxy-connect-timeout: "3600"
      nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
      nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    tls:
      enabled: false

  backup:
    enabled: false
    cronjob:
      annotations: {}
      storage:
        accessModes:
        - ReadWriteMany
        volumeMode: Filesystem
        resourcePolicy: keep
        existingClaim: ""
        storageClassName: ""
        size: 10Gi

launchpad:
  replicaCount: 1
  enabled: true
  image:
    registry: stardog.azurecr.io
    repository: sa-lab-stardog/launchpad
    tag: latest
    username: helm-stardog
    password: "uhdd7/iwy9nHf9b8mDWWHx0JsNsyTVh6d0h/Zl9kAz+ACRBtLFVf"

  tls:
    enabled: true

  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    #fsGroup: 1000

  certIssuer:
    enabled: true
    type: acme
    acme:
      email: admin@stardog.com
      server: https://acme-v02.api.letsencrypt.org/directory
      solvers:
        - http01:
            ingress:  
              class: nginx

  ingress:
    enabled: true
    annotations: {}
    className: "nginx"
    url: "lp.test.sd-testlab.com" # The URL for the ingress
    path: "/" # The path for the ingress
    pathType: "Prefix" # The path type (e.g., Prefix, Exact)
    tls:
      enabled: true

  service:
    enabled: true
    port: 8080
    type: ClusterIP
    loadBalancerIP: "192.168.1.2"

  environmentVariables:
    FRIENDLY_NAME: "Stardog Applications Cluster Alone"
    STARDOG_INTERNAL_ENDPOINT: "https://sparql.test.sd-testlab.com"
    STARDOG_EXTERNAL_ENDPOINT: "https://sparql.test.sd-testlab.com"

voicebox:
  enabled: true
  replicaCount: 2
  image:
    registry: stardog.azurecr.io
    repository: sa-lab-stardog/voicebox
    tag: latest
    pullPolicy: Always
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
  env:
    - name: VBX_CONFIG_FILE
      value: /voicebox-config/vbx_config.json
    - name: PRODUCTION
      value: "1"
  service:
    port: 8080
  nodeSelector:
    disktype: ssd
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: disktype
                operator: In
                values:
                  - ssd
  tolerations:
    - key: "key1"
      operator: "Equal"
      value: "value1"
      effect: "NoSchedule"
  resources: 
    requests:
      memory: "1000Mi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "1"
