# IT-OBS-001: Observability stack enabled alongside Stardog
# Tests: Prometheus scraping Stardog, Loki collecting logs, Grafana dashboards

global:
  stardog:
    enabled: true
  launchpad:
    enabled: false
  voicebox:
    enabled: false
  zookeeper:
    enabled: false
  bi:
    enabled: false
  gateway:
    enabled: false
  observability:
    enabled: true

stardog:
  ingress:
    enabled: false
  route:
    enabled: false
  gateway:
    enabled: false

observability:
  stardog:
    metricsEnabled: true
    prometheusRule:
      enabled: true
  prometheus:
    grafana:
      enabled: true
    alertmanager:
      enabled: false
    nodeExporter:
      enabled: false
    kubeStateMetrics:
      enabled: false
  loki:
    singleBinary:
      replicas: 1
  alloy:
    controller:
      type: daemonset
