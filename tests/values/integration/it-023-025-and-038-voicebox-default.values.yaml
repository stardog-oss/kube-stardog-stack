# Integration scenario file ID: IT-023-025-and-038
# Covers tests: 23, 24, 25, 38
# Purpose: baseline Voicebox-only install on the default port, with default probes and Bites disabled.
# Run as-is: yes
# Limitations:
# - Uses chart defaults for the Voicebox image and config.
# - Does not validate any external ingress or gateway exposure.
# Update before use:
# - No update required for template or basic cluster validation.
# - Override the image only if the active cluster cannot pull the default image.

global:
  stardog:
    enabled: false
  launchpad:
    enabled: false
  voicebox:
    enabled: true
  bi:
    enabled: false
  gateway:
    enabled: false

voicebox:
  bitesService:
    enabled: false
