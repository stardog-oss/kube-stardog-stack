apiVersion: v1
kind: Service
metadata:
  name: {{ include "sdcommon.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ include "sdcommon.fullname" . }}
    {{- include "sdcommon.labels.standard" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ports:
    - name: {{ (index .Values.ports 0).name }}
      port: {{ include "voicebox.servicePort" . | int }}
      targetPort: {{ (index .Values.ports 0).port }}
      protocol: TCP
  type: {{ .Values.service.type }}
  selector:
    app: {{ include "sdcommon.fullname" . }}

