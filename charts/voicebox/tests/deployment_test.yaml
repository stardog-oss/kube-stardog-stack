suite: Test Voicebox Deployment
values:
  - values/values-voicebox.yaml
templates:
  - deployment.yaml

tests:
  # Test 1: Ensure the Deployment is created with basic configuration
  - it: should create a Voicebox Deployment with basic configuration
    values:
      - values/values-voicebox.yaml
    asserts:
      - isKind:
          of: Deployment
      - matchRegex:
          path: metadata.name
          pattern: "^voicebox-.+"
      - equal:
          path: spec.replicas
          value: 2
      - equal:
          path: spec.template.spec.containers[0].image
          value: stardog.azurecr.io/sa-lab-stardog/voicebox:latest
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: Always
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 8000
      - equal:
          path: spec.template.spec.containers[0].ports[0].name
          value: http
      - equal:
          path: spec.template.spec.containers[0].ports[0].protocol
          value: TCP
      - equal:
          path: spec.template.spec.containers[0].command[5]
          value: --port
      - equal:
          path: spec.template.spec.containers[0].command[6]
          value: "8000"

  # Test 2: Validate environment variables
  - it: should set required environment variables
    values:
      - values/values-voicebox.yaml
    set:
      environmentVariables:
        AZURE_API_KEY: "azure-api-key"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: VBX_CONFIG_FILE
            value: /voicebox-config/vbx_config.json
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: TMPDIR
            value: /tmp
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AZURE_API_KEY
            value: "azure-api-key"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: PRODUCTION
            value: "1"

  # Test 3: Validate resources
  - it: should set correct resource limits and requests
    values:
      - values/values-voicebox.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.requests.memory
          value: "256Mi"
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: "250m"
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: "512Mi"
      - equal:
          path: spec.template.spec.containers[0].resources.limits.cpu
          value: "500m"

  # Test 4: Validate volume mounts
  - it: should mount config file volume
    values:
      - values/values-voicebox.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: tmp
            mountPath: /tmp
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: voicebox-RELEASE-NAME
            mountPath: /voicebox-config/vbx_config.json
            subPath: vbx_config.json
            readOnly: true

  # Test 5: Validate volumes
  - it: should create config volume
    values:
      - values/values-voicebox.yaml
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: tmp
            emptyDir: {}
      - contains:
          path: spec.template.spec.volumes
          content:
            name: voicebox-RELEASE-NAME
            configMap:
              name: voicebox-RELEASE-NAME
              items:
                - key: vbx_config.json
                  path: vbx_config.json

  - it: should use environmentVariables.TMPDIR for the temp mount path
    values:
      - values/values-voicebox.yaml
    set:
      environmentVariables:
        TMPDIR: /var/tmp/voicebox
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: TMPDIR
            value: /var/tmp/voicebox
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: tmp
            mountPath: /var/tmp/voicebox

  - it: should use environmentVariables.VBX_CONFIG_FILE for the config mount path
    values:
      - values/values-voicebox.yaml
    set:
      environmentVariables:
        VBX_CONFIG_FILE: /custom-config/voicebox.json
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: VBX_CONFIG_FILE
            value: /custom-config/voicebox.json
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: voicebox-RELEASE-NAME
            mountPath: /custom-config/voicebox.json
            subPath: vbx_config.json
            readOnly: true

  # Test 6: Validate security context
  - it: should set security context
    values:
      - values/values-voicebox.yaml
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.securityContext.runAsUser
          value: 1000
      - equal:
          path: spec.template.spec.securityContext.runAsGroup
          value: 1000

  # Test 7: Validate nodeSelector, affinity, and tolerations
  - it: should include nodeSelector, affinity, and tolerations when configured
    values:
      - values/values-voicebox.yaml
    asserts:
      - equal:
          path: spec.template.spec.nodeSelector.disktype
          value: ssd
      - equal:
          path: spec.template.spec.affinity.nodeAffinity.requiredDuringSchedulingIgnoredDuringExecution.nodeSelectorTerms[0].matchExpressions[0].key
          value: disktype
      - equal:
          path: spec.template.spec.affinity.nodeAffinity.requiredDuringSchedulingIgnoredDuringExecution.nodeSelectorTerms[0].matchExpressions[0].operator
          value: In
      - equal:
          path: spec.template.spec.affinity.nodeAffinity.requiredDuringSchedulingIgnoredDuringExecution.nodeSelectorTerms[0].matchExpressions[0].values[0]
          value: ssd
      - equal:
          path: spec.template.spec.tolerations[0].key
          value: key1
      - equal:
          path: spec.template.spec.tolerations[0].operator
          value: Equal
      - equal:
          path: spec.template.spec.tolerations[0].value
          value: value1
      - equal:
          path: spec.template.spec.tolerations[0].effect
          value: NoSchedule

  - it: should not include bites-specific env vars and volumes when disabled
    set:
      bitesService.enabled: false
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: VBX_BITES_CONFIG_FILE
      - notContains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: voicebox-RELEASE-NAME-bites-config
      - notContains:
          path: spec.template.spec.volumes
          content:
            name: voicebox-RELEASE-NAME-bites-config

  - it: should include bites-specific env vars and volumes when enabled
    set:
      bitesService.enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: VBX_BITES_CONFIG_FILE
            value: /bites-voicebox-config/vbx_bites_config.yaml
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: voicebox-RELEASE-NAME-bites-config
            mountPath: /bites-voicebox-config/vbx_bites_config.yaml
            subPath: vbx_bites_config.yaml
            readOnly: true
      - contains:
          path: spec.template.spec.volumes
          content:
            name: voicebox-RELEASE-NAME-bites-config
            configMap:
              name: voicebox-RELEASE-NAME-bites-config
              items:
                - key: vbx_bites_config.yaml
                  path: vbx_bites_config.yaml

  - it: should use environmentVariables.VBX_BITES_CONFIG_FILE for the bites config mount path
    set:
      bitesService.enabled: true
      environmentVariables:
        VBX_BITES_CONFIG_FILE: /custom-bites/config.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: VBX_BITES_CONFIG_FILE
            value: /custom-bites/config.yaml
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: voicebox-RELEASE-NAME-bites-config
            mountPath: /custom-bites/config.yaml
            subPath: vbx_bites_config.yaml
            readOnly: true

  - it: should pass a non-default service port to the container command and probes
    set:
      service:
        port: 8081
      ports:
        - name: api
          port: 8081
    asserts:
      - equal:
          path: spec.template.spec.containers[0].command[6]
          value: "8081"
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 8081
      - equal:
          path: spec.template.spec.containers[0].ports[0].name
          value: api
      - equal:
          path: spec.template.spec.containers[0].startupProbe.httpGet.port
          value: api
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.port
          value: api
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.port
          value: api

  - it: template labels match the selector labels
    asserts:
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/name"]
          value: "voicebox"
      - equal:
          path: spec.template.metadata.labels["app.kubernetes.io/name"]
          value: "voicebox"
      - exists:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: "RELEASE-NAME"
