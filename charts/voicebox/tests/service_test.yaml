suite: Test Voicebox Service
values:
  - values/values-voicebox.yaml
templates:
  - service.yaml

tests:
  # Test 1: Ensure the Service is created with basic configuration
  - it: should create a Voicebox Service with basic configuration
    values:
      - values/values-voicebox.yaml
    asserts:
      - isKind:
          of: Service
      - matchRegex:
          path: metadata.name
          pattern: "^voicebox-.+"
      - equal:
          path: spec.ports[0].port
          value: 8080
      - equal:
          path: spec.ports[0].targetPort
          value: 8000
      - equal:
          path: spec.ports[0].protocol
          value: TCP
      - equal:
          path: spec.ports[0].name
          value: http
      - equal:
          path: spec.type
          value: ClusterIP
      - equal:
          path: spec.selector.app
          value: voicebox-RELEASE-NAME

  - it: should create service with custom port (service.port) and type
    set:
      service:
        port: 8888
        type: LoadBalancer
    asserts:
      - equal:
          path: spec.ports[0].port
          value: 8888
      - equal:
          path: spec.type
          value: LoadBalancer

  - it: should create service with custom port (global.voicebox.service.port)
    set:
      global:
        voicebox:
          port: 8888
    asserts:
      - equal:
          path: spec.ports[0].port
          value: 8888
      - equal:
          path: spec.type
          value: ClusterIP

  - it: should create service with custom port with correct precendence
    set:
      service:
        port: 8888
      global:
        voicebox:
          service:
            port: 9999
    asserts:
      - equal:
          path: spec.ports[0].port
          value: 8888
      - equal:
          path: spec.type
          value: ClusterIP
