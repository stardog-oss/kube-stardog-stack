suite: Test Voicebox Service Account and RBAC
values:
  - values/values-voicebox.yaml
templates:
  - service_account.yaml

tests:
  - it: should render only ServiceAccount when bites service is disabled
    set:
      bitesService.enabled: false
    asserts:
      - hasDocuments:
          count: 1
      - documentIndex: 0
        isKind:
          of: ServiceAccount
      - documentIndex: 0
        equal:
          path: metadata.name
          value: voicebox-sa

  - it: should render bites RBAC when bites service is enabled
    set:
      bitesService.enabled: true
    asserts:
      - hasDocuments:
          count: 3
      - documentIndex: 1
        isKind:
          of: Role
      - documentIndex: 1
        equal:
          path: metadata.name
          value: voicebox-bites-service-role
      - documentIndex: 2
        isKind:
          of: RoleBinding
      - documentIndex: 2
        equal:
          path: metadata.name
          value: voicebox-bites-service-rolebinding
      - documentIndex: 2
        equal:
          path: subjects[0].name
          value: voicebox-sa
