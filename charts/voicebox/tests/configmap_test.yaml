suite: Test Voicebox ConfigMap
values:
  - values/values-voicebox.yaml
templates:
  - configmap.yaml

tests:
  - it: should not create bites ConfigMap when bites service is disabled
    set:
      bitesService.enabled: false
    asserts:
      - hasDocuments:
          count: 1

  - it: should create custom CA bundle ConfigMap from inline PEM
    set:
      customCaBundle:
        enabled: true
        bundle: |-
          -----BEGIN CERTIFICATE-----
          MIIBtest
          -----END CERTIFICATE-----
    asserts:
      - hasDocuments:
          count: 2
      - documentIndex: 1
        isKind:
          of: ConfigMap
      - documentIndex: 1
        equal:
          path: metadata.name
          value: voicebox-RELEASE-NAME-ca-bundle
      - documentIndex: 1
        equal:
          path: data["ca-bundle.crt"]
          value: |-
            -----BEGIN CERTIFICATE-----
            MIIBtest
            -----END CERTIFICATE-----

  - it: should not create custom CA bundle ConfigMap when an existing ConfigMap is used
    set:
      customCaBundle:
        enabled: true
        existingConfigMap: internal-ca
    asserts:
      - hasDocuments:
          count: 1

  # Test 1: Ensure the ConfigMap is created with basic configuration
  - it: should create a Voicebox ConfigMap with basic configuration
    values:
      - values/values-voicebox.yaml
    set:
      configFile: '{"agent_selection_type": "llm", "enable_lineage": true}'
    asserts:
      - isKind:
          of: ConfigMap
      - matchRegex:
          path: metadata.name
          pattern: "^voicebox-.+"
      - equal:
          path: data["vbx_config.json"]
          value: '{"agent_selection_type": "llm", "enable_lineage": true}'

  - it: should fail when configFile is empty
    set:
      configFile: ""
    asserts:
      - failedTemplate:
          errorMessage: "voicebox.configFile must be valid JSON and cannot be empty."

  - it: should fail when configFile is malformed JSON
    set:
      configFile: '{"agent_selection_type": "llm",}'
    asserts:
      - failedTemplate:
          errorMessage: 'executing "voicebox/templates/configmap.yaml" at <include "voicebox.configFileJson" .>: error calling include: template: voicebox/templates/_helpers.tpl:43:10: executing "voicebox.configFileJson" at <mustFromJson $configFile>: error calling mustFromJson: invalid character ''}'' looking for beginning of object key string'

  - it: should create bites ConfigMap when bites service is enabled
    set:
      bitesService.enabled: true
    asserts:
      - hasDocuments:
          count: 2
      - documentIndex: 1
        isKind:
          of: ConfigMap
      - documentIndex: 1
        equal:
          path: metadata.name
          value: voicebox-RELEASE-NAME-bites-config
      - documentIndex: 1
        exists:
          path: data["vbx_bites_config.yaml"]
      - documentIndex: 1
        matchRegex:
          path: data["vbx_bites_config.yaml"]
          pattern: '(?m)^\s*kind:\s*SparkApplication$'
      - documentIndex: 1
        matchRegex:
          path: data["vbx_bites_config.yaml"]
          pattern: '(?m)^\s*name:\s*voicebox-bites-job$'
      - documentIndex: 1
        matchRegex:
          path: data["vbx_bites_config.yaml"]
          pattern: '(?m)^\s*image:\s*"docker\.io/stardog/voicebox-bites:latest"$'
      - documentIndex: 1
        matchRegex:
          path: data["vbx_bites_config.yaml"]
          pattern: '(?m)^\s*serviceAccount:\s*voicebox-sa$'

  - it: should render bites SparkApplication timeToLiveSeconds when configured
    set:
      bitesService.enabled: true
      bitesService.sparkApplication.timeToLiveSeconds: 3600
    asserts:
      - documentIndex: 1
        matchRegex:
          path: data["vbx_bites_config.yaml"]
          pattern: '(?m)^\s*timeToLiveSeconds:\s*3600$'
