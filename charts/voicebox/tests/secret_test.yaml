suite: Test Voicebox Secret
values:
  - values/values-voicebox.yaml
templates:
  - secret.yaml

tests:
  # Test 1: Ensure the Secret is created when credentials are provided
  - it: should create a Voicebox image pull secret when credentials are provided
    set:
      image:
        username: "voicebox_user"
        password: "voicebox_pass"
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: RELEASE-NAME-voicebox-image-pull-secret
      - equal:
          path: type
          value: kubernetes.io/dockerconfigjson
      - exists:
          path: data[".dockerconfigjson"]
  - it: does not create image pull secret without credentials
    asserts:
      - hasDocuments:
          count: 0
