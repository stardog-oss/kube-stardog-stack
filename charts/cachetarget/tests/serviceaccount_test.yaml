suite: Cache Target ServiceAccount
values:
  - values/values-cachetarget.yaml
templates:
  - serviceaccount.yaml

tests:
  - it: renders service account when enabled
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: cachetarget-RELEASE-NAME-cache

  - it: skips service account when disabled
    set:
      serviceAccount:
        enabled: false
    asserts:
      - hasDocuments:
          count: 0
