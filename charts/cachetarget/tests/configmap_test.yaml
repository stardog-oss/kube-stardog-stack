suite: Cache Target ConfigMap
values:
  - values/values-cachetarget.yaml
templates:
  - configmap.yaml

tests:
  - it: renders default log4j config map
    documentIndex: 0
    asserts:
      - isKind:
          of: ConfigMap
      - equal:
          path: metadata.name
          value: cachetarget-RELEASE-NAME-cache-log4j
      - exists:
          path: data["log4j2.xml"]

  - it: renders properties config map
    documentIndex: 1
    asserts:
      - equal:
          path: metadata.name
          value: cachetarget-RELEASE-NAME-cache-properties
      - exists:
          path: data["stardog.properties"]

  - it: overrides log4j content when configured
    documentIndex: 0
    set:
      log4jConfig:
        override: true
        content: "<Configuration></Configuration>"
    asserts:
      - equal:
          path: data["log4j2.xml"]
          value: "<Configuration></Configuration>"
      - equal:
          path: data["log4j2.xml"]
          value: "<Configuration></Configuration>"
