suite: Cache Target Secrets
values:
  - values/values-cachetarget.yaml
templates:
  - secret.yaml

tests:
  - it: creates admin password secret by default
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: cachetarget-RELEASE-NAME-cache-password
      - equal:
          path: type
          value: Opaque

  - it: skips admin secret when passwordSecretRef provided
    set:
      admin:
        passwordSecretRef: external-secret
    asserts:
      - hasDocuments:
          count: 0

  - it: creates image pull secret when credentials provided
    set:
      image:
        username: "user"
        password: "pass"
    documentIndex: 0
    asserts:
      - equal:
          path: metadata.name
          value: cachetarget-RELEASE-NAME-cache-image-pull-secret
      - equal:
          path: type
          value: kubernetes.io/dockerconfigjson
      - exists:
          path: data[".dockerconfigjson"]
