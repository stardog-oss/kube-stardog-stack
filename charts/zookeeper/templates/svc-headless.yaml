apiVersion: v1
kind: Service
metadata:
  name: {{ include "zookeeper.headlessServiceName" . }}
  labels:
    {{- include "zookeeper.labels" . | nindent 4 }}
    {{- with .Values.headlessService.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.headlessService.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  clusterIP: None
  publishNotReadyAddresses: {{ .Values.headlessService.publishNotReadyAddresses }}
  selector:
    {{- include "zookeeper.selectorLabels" . | nindent 4 }}
  ports:
    - name: quorum
      port: {{ .Values.ports.quorum }}
      targetPort: quorum
    - name: leader-election
      port: {{ .Values.ports.leaderElection }}
      targetPort: leader-election
