{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "zookeeper.fullname" . }}
  labels:
    {{- include "zookeeper.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "zookeeper.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    {{- if .Values.networkPolicy.egress.enabled }}
    - Egress
    {{- end }}
  ingress:
    - from:
        {{- if .Values.networkPolicy.ingressNamespaceSelector }}
        - namespaceSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.ingressNamespaceSelector | nindent 14 }}
        {{- else }}
        - namespaceSelector: {}
        {{- end }}
        {{- if .Values.networkPolicy.ingressPodSelector }}
        - podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.ingressPodSelector | nindent 14 }}
        {{- end }}
      ports:
        - protocol: TCP
          port: {{ .Values.ports.client }}
        - protocol: TCP
          port: {{ .Values.ports.quorum }}
        - protocol: TCP
          port: {{ .Values.ports.leaderElection }}
        - protocol: TCP
          port: {{ .Values.ports.admin }}
        {{- if .Values.metrics.enabled }}
        - protocol: TCP
          port: {{ .Values.ports.metrics }}
        {{- end }}
  {{- if .Values.networkPolicy.egress.enabled }}
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.egress.dnsNamespaceSelector | nindent 14 }}
          podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.egress.dnsPodSelector | nindent 14 }}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
  {{- end }}
{{- end }}
