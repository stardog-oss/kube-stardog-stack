suite: Validate PodDisruptionBudget
values:
  - values/values-zookeeper.yaml
templates:
  - pdb.yaml

tests:
  # PDB creation
  - it: should not create PDB when disabled
    set:
      pdb:
        enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should create PDB when enabled
    set:
      pdb:
        enabled: true
        minAvailable: 2
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: PodDisruptionBudget
      - equal:
          path: metadata.name
          value: zookeeper-RELEASE-NAME

  # minAvailable
  - it: should use minAvailable when specified
    set:
      pdb:
        enabled: true
        minAvailable: 2
        maxUnavailable: ""
    asserts:
      - equal:
          path: spec.minAvailable
          value: 2
      - isNull:
          path: spec.maxUnavailable

  - it: should support minAvailable as percentage
    set:
      pdb:
        enabled: true
        minAvailable: "50%"
        maxUnavailable: ""
    asserts:
      - equal:
          path: spec.minAvailable
          value: "50%"

  # maxUnavailable
  - it: should use maxUnavailable when specified
    set:
      pdb:
        enabled: true
        minAvailable: ""
        maxUnavailable: 1
    asserts:
      - equal:
          path: spec.maxUnavailable
          value: 1
      - isNull:
          path: spec.minAvailable

  - it: should support maxUnavailable as percentage
    set:
      pdb:
        enabled: true
        minAvailable: ""
        maxUnavailable: "25%"
    asserts:
      - equal:
          path: spec.maxUnavailable
          value: "25%"

  # Selector
  - it: should use correct selector
    set:
      pdb:
        enabled: true
        minAvailable: 1
    asserts:
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/name"]
          value: zookeeper
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/instance"]
          value: RELEASE-NAME

  # Labels
  - it: should apply correct labels
    set:
      pdb:
        enabled: true
        minAvailable: 1
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: zookeeper
      - equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: RELEASE-NAME
      - isNotNull:
          path: metadata.labels["app.kubernetes.io/version"]
      - equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm

  # Ensemble scenarios
  - it: should allow 1 unavailable for 3-node ensemble
    set:
      replicaCount: 3
      pdb:
        enabled: true
        maxUnavailable: 1
    asserts:
      - equal:
          path: spec.maxUnavailable
          value: 1

  - it: should maintain quorum with minAvailable for 5-node ensemble
    set:
      replicaCount: 5
      pdb:
        enabled: true
        minAvailable: 3
    asserts:
      - equal:
          path: spec.minAvailable
          value: 3
