suite: Validate NetworkPolicy
values:
  - values/values-zookeeper.yaml
templates:
  - networkpolicy.yaml

tests:
  # NetworkPolicy creation
  - it: should not create NetworkPolicy when disabled
    set:
      networkPolicy:
        enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should create NetworkPolicy when enabled
    set:
      networkPolicy:
        enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: NetworkPolicy
      - equal:
          path: metadata.name
          value: zookeeper-RELEASE-NAME

  # Pod Selector
  - it: should use correct pod selector
    set:
      networkPolicy:
        enabled: true
    asserts:
      - equal:
          path: spec.podSelector.matchLabels["app.kubernetes.io/name"]
          value: zookeeper
      - equal:
          path: spec.podSelector.matchLabels["app.kubernetes.io/instance"]
          value: RELEASE-NAME

  # Policy Types
  - it: should have Ingress policy type
    set:
      networkPolicy:
        enabled: true
    asserts:
      - contains:
          path: spec.policyTypes
          content: Ingress

  - it: should have Egress policy type when egress is enabled
    set:
      networkPolicy:
        enabled: true
        egress:
          enabled: true
    asserts:
      - contains:
          path: spec.policyTypes
          content: Egress

  # Ingress Rules
  - it: should allow ingress from all namespaces by default
    set:
      networkPolicy:
        enabled: true
        ingressNamespaceSelector: {}
        ingressPodSelector: {}
    asserts:
      - isNotNull:
          path: spec.ingress

  - it: should allow ingress from specific namespace
    set:
      networkPolicy:
        enabled: true
        ingressNamespaceSelector:
          kubernetes.io/metadata.name: "my-namespace"
    asserts:
      - contains:
          path: spec.ingress[0].from
          content:
            namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: "my-namespace"

  - it: should allow ingress from specific pods
    set:
      networkPolicy:
        enabled: true
        ingressPodSelector:
          app: "my-app"
    asserts:
      - contains:
          path: spec.ingress[0].from
          content:
            podSelector:
              matchLabels:
                app: "my-app"

  - it: should expose client port in ingress
    set:
      networkPolicy:
        enabled: true
    asserts:
      - contains:
          path: spec.ingress[0].ports
          content:
            port: 2181
            protocol: TCP

  # Ensemble Communication
  - it: should expose ensemble ports in ingress
    set:
      networkPolicy:
        enabled: true
    asserts:
      - contains:
          path: spec.ingress[0].ports
          content:
            port: 2181
            protocol: TCP
      - contains:
          path: spec.ingress[0].ports
          content:
            port: 2888
            protocol: TCP
      - contains:
          path: spec.ingress[0].ports
          content:
            port: 3888
            protocol: TCP

  # Egress Rules
  - it: should allow DNS egress when egress is enabled
    set:
      networkPolicy:
        enabled: true
        egress:
          enabled: true
          dnsNamespaceSelector:
            kubernetes.io/metadata.name: kube-system
          dnsPodSelector:
            k8s-app: kube-dns
    asserts:
      - contains:
          path: spec.egress
          content:
            to:
              - namespaceSelector:
                  matchLabels:
                    kubernetes.io/metadata.name: kube-system
                podSelector:
                  matchLabels:
                    k8s-app: kube-dns
            ports:
              - port: 53
                protocol: UDP
              - port: 53
                protocol: TCP

  # Labels
  - it: should apply correct labels
    set:
      networkPolicy:
        enabled: true
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: zookeeper
      - equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: RELEASE-NAME
      - isNotNull:
          path: metadata.labels["app.kubernetes.io/version"]
      - equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm
