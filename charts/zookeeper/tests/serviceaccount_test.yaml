suite: Validate ServiceAccount
values:
  - values/values-zookeeper.yaml
templates:
  - serviceaccount.yaml

tests:
  # ServiceAccount creation
  - it: should create a ServiceAccount when enabled
    set:
      serviceAccount:
        create: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: zookeeper-RELEASE-NAME

  - it: should not create ServiceAccount when disabled
    set:
      serviceAccount:
        create: false
    asserts:
      - hasDocuments:
          count: 0

  # Custom name
  - it: should use custom name when provided
    set:
      serviceAccount:
        create: true
        name: "custom-sa-name"
    asserts:
      - equal:
          path: metadata.name
          value: "custom-sa-name"

  # Automount token
  - it: should automount service account token by default
    set:
      serviceAccount:
        create: true
        automountServiceAccountToken: true
    asserts:
      - equal:
          path: automountServiceAccountToken
          value: true

  - it: should not automount service account token when disabled
    set:
      serviceAccount:
        create: true
        automountServiceAccountToken: false
    asserts:
      - equal:
          path: automountServiceAccountToken
          value: false

  # Annotations
  - it: should apply custom annotations
    set:
      serviceAccount:
        create: true
        annotations:
          eks.amazonaws.com/role-arn: "arn:aws:iam::123456789012:role/my-role"
          custom-annotation: "test-value"
    asserts:
      - equal:
          path: metadata.annotations["eks.amazonaws.com/role-arn"]
          value: "arn:aws:iam::123456789012:role/my-role"
      - equal:
          path: metadata.annotations.custom-annotation
          value: "test-value"

  - it: should not have annotations when none are specified
    set:
      serviceAccount:
        create: true
        annotations: {}
    asserts:
      - isNull:
          path: metadata.annotations

  # Labels
  - it: should apply correct labels
    set:
      serviceAccount:
        create: true
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: zookeeper
      - equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: RELEASE-NAME
      - isNotNull:
          path: metadata.labels["app.kubernetes.io/version"]
      - equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm
