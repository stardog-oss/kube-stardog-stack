# Default values for zookeeper.

nameOverride: ""
fullnameOverride: ""

# Kubernetes cluster domain used to build FQDNs
clusterDomain: cluster.local

image:
  # Apache ZooKeeper support is provided as a convenience for non-production or
  # simple deployments. Stardog does not own or harden this container image.
  # For production, use a commercially supported or internally hardened
  # ZooKeeper image/deployment.
  registry: docker.io
  repository: zookeeper
  tag: 3.9.4
  pullPolicy: IfNotPresent
  # Request user credentials to Stardog team.
  username: ""
  password: ""
  pullSecrets: []

replicaCount: 3

# Minimum seconds an updated ZooKeeper pod must stay Ready before StatefulSet
# rolling updates continue to the next ordinal.
minReadySeconds: 20

# Default pod management policy for new ZooKeeper StatefulSets.
# Kubernetes treats spec.podManagementPolicy as immutable, so upgrades preserve
# the already deployed StatefulSet value when one exists.
podManagementPolicy: OrderedReady

upgrade:
  # Break-glass override for upgrades from an existing StatefulSet with
  # podManagementPolicy: Parallel. Leave false unless you intentionally accept
  # the risk that a rolling update can restart all ZooKeeper pods in parallel.
  allowParallelPodManagementPolicy: false

# minServerId added to pod ordinal (default 1).
# Example: pod "-0" => myid=1, "-1" => myid=2, ...
minServerId: 3

# Standalone mode toggle (official image env: ZOO_STANDALONE_ENABLED).
# If left as null (default), chart auto-sets:
# - replicaCount >= 2 => false
# - replicaCount == 1 => true
# You can still explicitly override to true/false.
standaloneEnabled: null

# Enable ZooKeeper AdminServer (official image env: ZOO_ADMINSERVER_ENABLED).
# Disabled by default because the chart probes use the ZooKeeper client port.
adminServerEnabled: false

ports:
  client: 2181
  quorum: 2888
  leaderElection: 3888
  admin: 8080
  metrics: 7000

service:
  type: ClusterIP
  annotations: {}
  labels: {}
  # Expose the AdminServer port through the Service only when adminServerEnabled is true.
  exposeAdmin: false
  exposeMetrics: true

headlessService:
  annotations: {}
  labels: {}
  publishNotReadyAddresses: true

persistence:
  enabled: true
  data:
    size: 8Gi
    accessModes: ["ReadWriteOnce"]
    storageClass: ""
    annotations: {}
    labels: {}
  datalog:
    enabled: false
    size: 8Gi
    accessModes: ["ReadWriteOnce"]
    storageClass: ""
    annotations: {}
    labels: {}

emptyDir:
  sizeLimit: ""

volumePermissions:
  enabled: false
  image:
    repository: busybox
    tag: "1.36"
    pullPolicy: IfNotPresent
  resources: {}
  securityContext:
    runAsUser: 0
    runAsGroup: 0
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true

config:
  tickTime: 2000
  initLimit: 10
  syncLimit: 5
  maxClientCnxns: 60

  # Optional additional tunables injected via ZOO_CFG_EXTRA when set
  preAllocSize: ""
  snapCount: ""
  maxSessionTimeout: ""

  # Chart default probes require only `ruok` for liveness and `srvr` for readiness.
  # Add more commands only when you need them for custom probes or operational
  # debugging. Refer to the Apache ZooKeeper documentation for allowed commands:
  # https://zookeeper.apache.org/doc/current/zookeeperAdmin.html#sc_zkCommands
  fourLetterWordsWhitelist: "ruok,srvr"

  autopurge:
    purgeInterval: 0
    snapRetainCount: 3

  # Extra zoo.cfg lines appended verbatim (official image env: ZOO_CFG_EXTRA).
  cfgExtra: ""

  # Provide a full zoo.cfg via ConfigMap mount to /conf/zoo.cfg (optional)
  zooCfg:
    enabled: false
    existingConfigMap: ""
    inline: |
      tickTime=2000
      initLimit=10
      syncLimit=5
      dataDir=/data
      dataLogDir=/datalog
      clientPort=2181

  # Provide logback.xml via ConfigMap mount to /conf/logback.xml (optional)
  logback:
    enabled: false
    existingConfigMap: ""
    inline: |
      <configuration>
        <appender name="STDOUT" class="ch.qos.logback.core.ConsoleAppender">
          <encoder>
            <pattern>%d{ISO8601} %-5level [%thread] %logger - %msg%n</pattern>
          </encoder>
        </appender>
        <root level="INFO">
          <appender-ref ref="STDOUT" />
        </root>
      </configuration>

ensemble:
  # Override ZOO_SERVERS (advanced). If empty, auto-generated.
  zooServersOverride: ""

probes:
  enabled: true
  readiness:
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 6
    successThreshold: 1
  liveness:
    initialDelaySeconds: 20
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 6
  customReadinessProbe: {}
  customLivenessProbe: {}

metrics:
  enabled: false
  port: 7000
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    labels: {}
    namespace: ""

resources:
  requests:
    memory: "500Mi"
    cpu: "500m"
  limits:
    memory: "1Gi"
    cpu: "1"


podAnnotations: {}
podLabels: {}

affinity: {}
nodeSelector: {}
tolerations: []
topologySpreadConstraints: []

podAntiAffinityPreset: "soft" # "soft" | "hard" | ""
nodeAffinityPreset:
  type: "" # "soft" | "hard" | ""
  key: ""
  values: []

pdb:
  enabled: false
  minAvailable: 1
  maxUnavailable: ""

updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    partition: 0

podSecurityContext:
  enabled: true
  fsGroup: 1000

containerSecurityContext:
  enabled: true
  runAsUser: 1000
  runAsGroup: 1000
  runAsNonRoot: true
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false

serviceAccount:
  create: true
  name: ""
  annotations: {}
  automountServiceAccountToken: true

rbac:
  create: false

networkPolicy:
  enabled: false
  ingressNamespaceSelector: {}
  ingressPodSelector: {}
  egress:
    enabled: false
    dnsNamespaceSelector:
      kubernetes.io/metadata.name: kube-system
    dnsPodSelector:
      k8s-app: kube-dns

extraEnvVars: []
extraVolumes: []
extraVolumeMounts: []
extraInitContainers: []
extraSidecars: []

commonLabels: {}
commonAnnotations: {}
