suite: Validate StatefulSet
values:
  - values/values-launchpad.yaml
templates:
- statefulset.yaml
tests:
# Test for Launchpad StatefulSet
- it: should create a Launchpad StatefulSet
  set:
    replicaCount: 1
    image:
      registry: stardog.azurecr.io
      repository: sa-lab-stardog/launchpad
      tag: v3.0.0
      pullPolicy: IfNotPresent
  documentSelector:
    path: metadata.name
    value: launchpad-RELEASE-NAME
  asserts:
  - isKind:
      of: StatefulSet
  - equal:
      path: metadata.name
      value: launchpad-RELEASE-NAME
  - equal:
      path: spec.replicas
      value: 1
  - equal:
      path: spec.serviceName
      value: launchpad-RELEASE-NAME
  - equal:
      path: spec.template.spec.containers[0].name
      value: launchpad-RELEASE-NAME
  - equal:
      path: spec.template.spec.containers[0].image
      value: "stardog.azurecr.io/sa-lab-stardog/launchpad:v3.0.0"
  - equal:
      path: spec.template.spec.containers[0].imagePullPolicy
      value: "IfNotPresent"
  - equal:
      path: spec.template.spec.containers[0].ports[0].name
      value: "http"
  - equal:
      path: spec.template.spec.containers[0].ports[0].containerPort
      value: 8080
  - equal:
      path: spec.template.spec.containers[0].ports[0].protocol
      value: "TCP"

- it: matches PVC name with data mount
  asserts:
  - equal:
      path: spec.volumeClaimTemplates[0].metadata.name
      value: launchpad-data
  - equal:
      path: spec.template.spec.containers[0].volumeMounts[0].name
      value: launchpad-data

- it: should set required environment variables
  set:
    environmentVariables:
      FRIENDLY_NAME: "Custom Stardog Applications"
      SECURE: "true"
      BASE_URL: "https://custom.example.com"
  documentSelector:
    path: metadata.name
    value: launchpad-RELEASE-NAME
  asserts:
  - hasDocuments:
      count: 1
  - contains:
      path: spec.template.spec.containers[0].env
      content:
        name: "COOKIE_SECRET"
        valueFrom:
          secretKeyRef:
            name: "launchpad-RELEASE-NAME-cookie-secret"
            key: "COOKIE_SECRET"
  - contains:
      path: spec.template.spec.containers[0].env
      content:
        name: "FRIENDLY_NAME"
        value: "Custom Stardog Applications"
  - contains:
      path: spec.template.spec.containers[0].env
      content:
        name: "SECURE"
        value: "true"
  - contains:
      path: spec.template.spec.containers[0].env
      content:
        name: "BASE_URL"
        value: "https://custom.example.com"

- it: should auto-generate voicebox service endpoint when voicebox is enabled in global, with port default
  set:
    global:
      voicebox:
        enabled: true
  documentSelector:
    path: metadata.name
    value: launchpad-RELEASE-NAME
  asserts:
  - contains:
      path: spec.template.spec.containers[0].env
      content:
        name: "VOICEBOX_SERVICE_ENDPOINT"
        value: "http://voicebox-RELEASE-NAME.NAMESPACE.svc.cluster.local:8000"

- it: should auto-generate voicebox service endpoint when voicebox is enabled in global, with port override
  set:
    global:
      voicebox:
        enabled: true
        service:
          port: 9000
  documentSelector:
    path: metadata.name
    value: launchpad-RELEASE-NAME
  asserts:
  - contains:
      path: spec.template.spec.containers[0].env
      content:
        name: "VOICEBOX_SERVICE_ENDPOINT"
        value: "http://voicebox-RELEASE-NAME.NAMESPACE.svc.cluster.local:9000"

- it: should use manual voicebox endpoint when provided
  set:
    environmentVariables:
      VOICEBOX_SERVICE_ENDPOINT: "http://custom-voicebox.example.com:8080"
  documentSelector:
    path: metadata.name
    value: launchpad-RELEASE-NAME
  asserts:
  - contains:
      path: spec.template.spec.containers[0].env
      content:
        name: "VOICEBOX_SERVICE_ENDPOINT"
        value: "http://custom-voicebox.example.com:8080"

- it: should not set voicebox endpoint when voicebox is implicitely stated
  set:
    global:
      voicebox:
        enabled: false
  documentSelector:
    path: metadata.name
    value: launchpad-RELEASE-NAME
  asserts:
  - notContains:
      path: spec.template.spec.containers[0].env
      content:
        name: "VOICEBOX_SERVICE_ENDPOINT"

- it: should not set voicebox endpoint when voicebox  explicitely  stated
  documentSelector:
    path: metadata.name
    value: launchpad-RELEASE-NAME
  asserts:
  - notContains:
      path: spec.template.spec.containers[0].env
      content:
        name: "VOICEBOX_SERVICE_ENDPOINT"

- it: should configure security context
  set:
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
  documentSelector:
    path: metadata.name
    value: launchpad-RELEASE-NAME
  asserts:
  - equal:
      path: spec.template.spec.securityContext.runAsNonRoot
      value: true
  - equal:
      path: spec.template.spec.securityContext.runAsUser
      value: 1000
  - equal:
      path: spec.template.spec.securityContext.runAsGroup
      value: 1000
  - equal:
      path: spec.template.spec.securityContext.fsGroup
      value: 1000

- it: should configure container security context
  set:
    containerSecurityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
  documentSelector:
    path: metadata.name
    value: launchpad-RELEASE-NAME
  asserts:
  - equal:
      path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
      value: false
  - equal:
      path: spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem
      value: true

- it: should configure resources
  set:
    resources:
      requests:
        cpu: "500m"
        memory: "1Gi"
      limits:
        cpu: "1000m"
        memory: "2Gi"
  documentSelector:
    path: metadata.name
    value: launchpad-RELEASE-NAME
  asserts:
  - equal:
      path: spec.template.spec.containers[0].resources.requests.cpu
      value: "500m"
  - equal:
      path: spec.template.spec.containers[0].resources.requests.memory
      value: "1Gi"
  - equal:
      path: spec.template.spec.containers[0].resources.limits.cpu
      value: "1000m"
  - equal:
      path: spec.template.spec.containers[0].resources.limits.memory
      value: "2Gi"

- it: should configure persistence
  set:
    persistence:
      size: "5Gi"
      storageClass: "fast-ssd"
      annotations:
        custom.annotation: "value"
  documentSelector:
    path: metadata.name
    value: launchpad-RELEASE-NAME
  asserts:
  - equal:
      path: spec.volumeClaimTemplates[0].spec.resources.requests.storage
      value: "5Gi"
  - equal:
      path: spec.volumeClaimTemplates[0].spec.storageClassName
      value: "fast-ssd"
- it: template labels match the selector labels
  asserts:
    - equal:
        path: spec.selector.matchLabels["app.kubernetes.io/name"]
        value: "launchpad"
    - equal:
        path: spec.template.metadata.labels["app.kubernetes.io/name"]
        value: "launchpad"
    - equal:
        path: metadata.labels["app.kubernetes.io/instance"]
        value: "RELEASE-NAME"

- it: has stable rollout checksums for consumed config and secrets
  asserts:
    - matchRegex:
        path: spec.template.metadata.annotations["checksum/config"]
        pattern: "^[a-f0-9]{64}$"
    - matchRegex:
        path: spec.template.metadata.annotations["checksum/secret"]
        pattern: "^[a-f0-9]{64}$"
