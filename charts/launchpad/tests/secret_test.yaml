suite: Validate Secrets
templates:
  - secret.yaml
tests:
# Test for Launchpad Image Pull Secret
  - it: should create a Launchpad image pull secret when credentials are provided
    values:
      - values/values-launchpad.yaml
    set:
      image:
        username: "launchpad_user"
        password: "launchpad_pass"
    documentSelector:
      path: metadata.name
      value: launchpad-RELEASE-NAME-image-pull-secret
    asserts:
    - isKind:
        of: Secret
    - equal:
        path: metadata.name
        value: launchpad-RELEASE-NAME-image-pull-secret
    - equal:
        path: type
        value: kubernetes.io/dockerconfigjson
  - it: does not create image pull secret without credentials
    asserts:
      - hasDocuments:
         count: 1 # cookie secret only

  - it: renders cookie secret with keep annotation and provided value
    set:
      env:
        COOKIE_SECRET: "super-secret"
    documentIndex: 0
    asserts:
      - equal:
          path: metadata.name
          value: launchpad-RELEASE-NAME-cookie-secret
      - equal:
          path: metadata.annotations["helm.sh/resource-policy"]
          value: keep
      - equal:
          path: data.COOKIE_SECRET
          value: c3VwZXItc2VjcmV0
