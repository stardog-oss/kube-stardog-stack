suite: Validate Services
templates:
  - service.yaml
tests:
# Test for Launchpad Service
- it: should create a Launchpad service when Launchpad is enabled
  values:
    - values/values-launchpad.yaml
  set:
    enabled: true
    service:
      enabled: true
      port: 8080
      type: ClusterIP
      loadBalancerIP: "192.168.1.2"
  asserts:
  - isKind:
      of: Service
  - equal:
      path: metadata.name
      value: launchpad-RELEASE-NAME
  - equal:
      path: spec.ports[0].port
      value: 80
  - equal:
      path: spec.ports[0].targetPort
      value: 8080
  - equal:
      path: spec.type
      value: ClusterIP
  - equal:
      path: spec.loadBalancerIP
      value: "192.168.1.2"
