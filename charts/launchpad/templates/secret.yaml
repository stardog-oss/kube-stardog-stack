{{- /* Image pull secret: only create when image map exists and both username/password provided */ -}}
{{- if and (hasKey .Values "image") (ne (default "" .Values.image.username) "") (ne (default "" .Values.image.password) "") -}}
apiVersion: v1
kind: Secret
metadata:
  name: launchpad-{{ .Release.Name }}-image-pull-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{ include "sdcommon.labels.standard" . | nindent 4 }}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ template "launchpadimagePullSecret" .  }}
{{- end }}
---

{{- /* Cookie secret: compute COOKIE_SECRET safely so missing .Values.env doesn't panic */ -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace (printf "launchpad-%s-cookie-secret" .Release.Name) }}

{{- if not $existing }}
{{- $cookie := "" }}
{{- if hasKey .Values "env" }}
  {{- with .Values.env.COOKIE_SECRET }}
    {{- $cookie = . }}
  {{- end }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: launchpad-{{ .Release.Name }}-cookie-secret
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/resource-policy": keep
  labels:
    {{ include "sdcommon.labels.standard" . | nindent 4 }}
type: Opaque
data:
  COOKIE_SECRET: {{ $cookie | default (randAlphaNum 32) | b64enc | quote }}
{{- end }}
