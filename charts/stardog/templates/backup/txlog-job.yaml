{{- if .Values.backup.txlog.enabled }}
  {{- if not .Values.backup.enabled }}
    {{- fail "backup.txlog.enabled=true requires backup.enabled=true. Enable the backup feature to use transaction log shipping." }}
  {{- end }}
  {{- $hasMount := or .Values.backup.location.persistentVolume.enabled .Values.backup.location.azure.enabled }}
  {{- if and .Values.backup.location.s3.enabled (not $hasMount) }}
    {{- fail "backup.txlog is not supported with backup.location.s3. stardog-admin tx log --output writes to a local filesystem path and has no s3:// output form (unlike stardog-admin server backup), so the shipping CronJob has nowhere to land files when S3 is the only backend. Use backup.location.persistentVolume or backup.location.azure (the chart's Azure backend is a CSI-mounted PVC). Adding S3 destination support is a Stardog product change planned for the future." }}
  {{- end }}
  {{- if not $hasMount }}
    {{- fail "backup.txlog requires a writable PVC-backed destination: set either backup.location.persistentVolume.enabled=true or backup.location.azure.enabled=true." }}
  {{- end }}
{{- end }}
{{- if and .Values.backup.enabled .Values.backup.txlog.enabled .Values.backup.txlog.cronjob.enabled }}
{{- $fullname := include "sdcommon.fullname" . }}
{{- $credentialsSecret := .Values.backup.credentialsSecret | default (printf "%s-backup-credentials" $fullname) }}
{{- $backupDir := "" }}
{{- if .Values.backup.location.persistentVolume.enabled }}
  {{- $backupDir = .Values.backup.location.persistentVolume.backupDir }}
{{- else if .Values.backup.location.azure.enabled }}
  {{- $backupDir = .Values.backup.location.azure.backupDir }}
{{- end }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ $fullname }}-txlog-shipping
  namespace: {{ .Release.Namespace }}
  labels:
    {{ include "sdcommon.labels.standard" . | nindent 4 }}
  {{- if .Values.backup.txlog.cronjob.timeZone }}
  annotations:
    cronjob.kubernetes.io/timezone: {{ .Values.backup.txlog.cronjob.timeZone | quote }}
  {{- end }}
spec:
  schedule: {{ .Values.backup.txlog.cronjob.schedule | quote }}
  concurrencyPolicy: {{ .Values.backup.txlog.cronjob.concurrencyPolicy }}
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: {{ .Values.backup.txlog.cronjob.ttlSecondsAfterFinished }}
      backoffLimit: {{ .Values.backup.txlog.cronjob.backoffLimit }}
      template:
        metadata:
          labels:
            {{ include "sdcommon.labels.standard" . | nindent 12 }}
        spec:
          restartPolicy: Never
          {{- if .Values.backup.credentialsSecret }}
          {{- include "sdcommon.ensureSecretExists" (dict "context" $ "name" .Values.backup.credentialsSecret "namespace" .Release.Namespace) }}
          {{- end }}
          securityContext:
          {{- toYaml .Values.securityContext | nindent 12 }}
          volumes:
          # /tmp must be writable: stardog-admin's HTTP client spools the tx
          # log response to java.io.tmpdir, and the container runs with
          # readOnlyRootFilesystem: true.
          - name: dump-tmp
            emptyDir: {}
          - name: {{ $fullname }}-backup
            persistentVolumeClaim:
              {{- if .Values.backup.location.persistentVolume.enabled }}
              claimName: {{ .Values.backup.location.persistentVolume.customPersitentVolumeClaim }}
              {{- else if .Values.backup.location.azure.enabled }}
              claimName: {{ include "sdcommon.pvcName" (dict "context" . "chart" "stardog" "id" "backup-azure") }}
              {{- end }}
          containers:
          - name: tx-log-shipper
            image: {{ .Values.image.registry }}/{{ .Values.image.repository }}:{{ .Values.image.tag }}
            imagePullPolicy: {{ .Values.image.pullPolicy }}
            securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 14 }}
            resources:
              {{- toYaml .Values.backup.txlog.resources | nindent 14 }}
            volumeMounts:
            - name: dump-tmp
              mountPath: /tmp
            - name: {{ $fullname }}-backup
              mountPath: /var/opt/stardog/backups
              readOnly: false
            env:
            - name: STARDOG_HOST
              value: "http://{{ $fullname }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.ports.server }}"
            - name: STARDOG_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ $credentialsSecret }}
                  key: username
            - name: STARDOG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $credentialsSecret }}
                  key: password
            - name: TXLOG_INCLUDE
              value: {{ join " " .Values.backup.txlog.databases.include | quote }}
            - name: TXLOG_EXCLUDE
              value: {{ join " " .Values.backup.txlog.databases.exclude | quote }}
            - name: BACKUP_LOCATION
              value: {{ $backupDir | quote }}
            - name: RELEASE_NAME
              value: {{ .Release.Name | quote }}
            - name: TXLOG_PATH_PREFIX
              value: {{ .Values.backup.txlog.pathPrefix | quote }}
            command:
            - /bin/bash
            - -c
            - |
              set +x
              set -o pipefail

              function stardog_healthcheck {
                COUNT=0
                while true; do
                  if [[ ${COUNT} -gt 300 ]]; then
                    echo "Timeout waiting for Stardog to start."
                    return 1
                  fi
                  if curl -s --head --request GET ${STARDOG_HOST}/admin/healthcheck | grep "200 OK" > /dev/null; then
                    echo "Stardog is up and running."
                    return 0
                  fi
                  COUNT=$((COUNT+1))
                  sleep 1
                done
              }

              stardog_healthcheck
              if [ $? -ne 0 ]; then
                echo "Stardog server is not healthy; aborting tx log shipping run."
                exit 1
              fi

              TIMESTAMP=$(date -u +"%Y%m%dT%H%M%SZ")
              echo "Run timestamp: ${TIMESTAMP}"

              DEST_ROOT="/var/opt/stardog/backups/${BACKUP_LOCATION}/${RELEASE_NAME}/${TXLOG_PATH_PREFIX}"
              echo "Destination root: ${DEST_ROOT}"

              DBS_RESPONSE=$(curl -sS --fail -u "${STARDOG_USERNAME}:${STARDOG_PASSWORD}" "${STARDOG_HOST}/admin/databases")
              if [ $? -ne 0 ]; then
                echo "Failed to list databases from ${STARDOG_HOST}/admin/databases"
                exit 1
              fi

              # Response shape: {"databases":["db1","db2",...]}
              # jq is not present in the Stardog image, so parse with shell tools and then
              # defensively validate each parsed name against Stardog's allowed character set.
              ALL_DBS=$(echo "${DBS_RESPONSE}" | tr -d '[:space:]' | grep -oE '\[[^]]*\]' | tr -d '[]"' | tr ',' '\n' | grep -v '^$' || true)

              if [ -z "${ALL_DBS}" ]; then
                echo "No databases present on the server; nothing to ship."
                exit 0
              fi

              for name in ${ALL_DBS}; do
                if ! echo "${name}" | grep -qE '^[A-Za-z0-9_-]+$'; then
                  echo "Refusing to proceed: parsed database name '${name}' does not match [A-Za-z0-9_-]+."
                  echo "Raw /admin/databases response:"
                  echo "${DBS_RESPONSE}"
                  exit 1
                fi
              done

              SELECTED=""
              for db in ${ALL_DBS}; do
                if [ -n "${TXLOG_INCLUDE}" ]; then
                  match=0
                  for inc in ${TXLOG_INCLUDE}; do
                    if [ "${db}" = "${inc}" ]; then match=1; break; fi
                  done
                  if [ ${match} -eq 0 ]; then continue; fi
                fi
                if [ -n "${TXLOG_EXCLUDE}" ]; then
                  skip=0
                  for exc in ${TXLOG_EXCLUDE}; do
                    if [ "${db}" = "${exc}" ]; then skip=1; break; fi
                  done
                  if [ ${skip} -eq 1 ]; then continue; fi
                fi
                SELECTED="${SELECTED} ${db}"
              done

              if [ -z "${SELECTED}" ]; then
                echo "No databases selected after applying include/exclude filters; nothing to ship."
                echo "  include=[${TXLOG_INCLUDE}] exclude=[${TXLOG_EXCLUDE}] all=[$(echo ${ALL_DBS} | tr '\n' ' ')]"
                exit 0
              fi

              echo "Selected databases:${SELECTED}"

              FAILED=""
              SKIPPED_EMPTY=""
              for db in ${SELECTED}; do
                DB_DIR="${DEST_ROOT}/${db}"
                OUT_FILE="${DB_DIR}/${TIMESTAMP}.txlog"
                mkdir -p "${DB_DIR}"
                echo "Dumping transaction log for database: ${db} -> ${OUT_FILE}"
                DUMP_OUT=$(/opt/stardog/bin/stardog-admin --server "${STARDOG_HOST}" tx log \
                  -u "${STARDOG_USERNAME}" -p "${STARDOG_PASSWORD}" \
                  --format raw --output "${OUT_FILE}" \
                  -- "${db}" 2>&1)
                rc=$?
                echo "${DUMP_OUT}"
                if [ ${rc} -eq 0 ]; then
                  continue
                fi
                # The server returns UnknownTransactionException / "Failed to find any data
                # in the txn log for the provided range" when a database has no transactions
                # recorded yet (or only system-internal traffic). This is not a failure from
                # a DR perspective - there's just nothing to ship. Treat it as a warning.
                if echo "${DUMP_OUT}" | grep -q "Failed to find any data in the txn log"; then
                  echo "  -> no transactions recorded for ${db}; skipping."
                  rm -f "${OUT_FILE}"
                  SKIPPED_EMPTY="${SKIPPED_EMPTY} ${db}"
                  continue
                fi
                echo "Failed to dump tx log for ${db} (rc=${rc})"
                FAILED="${FAILED} ${db}"
              done

              if [ -n "${FAILED}" ]; then
                echo "Transaction log dump failed for:${FAILED}"
                exit 1
              fi

              if [ -n "${SKIPPED_EMPTY}" ]; then
                echo "Skipped (no transactions):${SKIPPED_EMPTY}"
              fi

              echo "All transaction log dumps completed successfully."
          {{- if and (hasKey .Values "image") .Values.image.pullSecrets }}
          imagePullSecrets:
          {{ toYaml .Values.image.pullSecrets | nindent 12 }}
          {{- end }}
          {{- if and (hasKey .Values "image") .Values.image.username .Values.image.password }}
          imagePullSecrets:
            - name: {{ .Release.Name }}-image-pull-secret
          {{- end }}
{{- end }}
