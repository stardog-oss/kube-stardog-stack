{{- $globalGatewayEnabled := eq (include "sdcommon.globalGatewayEnabled" .) "true" -}}
{{- $globalGatewayManaged := eq (include "sdcommon.globalGatewayManaged" .) "true" -}}
{{- $globalValues := default (dict) .Values.global -}}
{{- $globalGateway := default (dict) (index $globalValues "gateway") -}}
{{- $globalTls := default (dict) (index $globalGateway "tls") -}}
{{- $globalTlsEnabled := default true (index $globalTls "enabled") -}}
{{- $globalGatewayExternal := eq (include "sdcommon.globalGatewayExternal" .) "true" -}}
{{- $globalIssuer := default (dict) (index $globalValues "certIssuer") -}}
{{- $globalCertSecret := trim (default "" (index $globalIssuer "secretName")) -}}
{{- $globalCertTpl := trim (default "" (index $globalIssuer "secretNameTpl")) -}}
{{- $globalGatewayTlsSecret := trim (default "" (index $globalTls "secretName")) -}}
{{- $globalGatewaySparqlTlsSecret := trim (default "" (index $globalTls "sparqlSecretName")) -}}
{{- $globalGatewayBiTlsSecret := trim (default "" (index $globalTls "biSecretName")) -}}
{{- $externalGlobalTlsConfigured := and $globalGatewayExternal $globalTlsEnabled (or (ne $globalGatewayTlsSecret "") (ne $globalGatewaySparqlTlsSecret "") (ne $globalGatewayBiTlsSecret "") (ne $globalCertSecret "") (ne $globalCertTpl "")) -}}
{{- $tlsEnabled := or (default false .Values.gateway.http.tls.enabled) (and $globalGatewayManaged $globalTlsEnabled) $externalGlobalTlsConfigured -}}
  {{- $issuer := (include "sdcommon.effectiveCertIssuer" . | fromYaml) -}}
  {{- $launchpadEnabled := false }}
  {{- if and (hasKey .Values "global") (hasKey .Values.global "launchpad") (hasKey .Values.global.launchpad "enabled") -}}
    {{- $raw := index .Values.global.launchpad "enabled" -}}
    {{- $launchpadEnabled = or (eq $raw true) (eq (toString $raw) "true") -}}
  {{- end -}}
  {{- if and (eq (include "stardog.gatewayEnabled" .) "true") $issuer.enabled $tlsEnabled }}
  {{- $rawGateway := default (dict) .Values.gateway }}
  {{- $httpConfig := default (dict) $rawGateway.http }}
  {{- $gatewayConfig := deepCopy $httpConfig }}
  {{- if not $gatewayConfig.tls }}
    {{- $_ := set $gatewayConfig "tls" (dict) }}
  {{- end }}
  {{- $globalGatewayNamespace := include "sdcommon.globalGatewayNamespace" . }}
  {{- if and (or $globalGatewayManaged $globalGatewayExternal) (ne $globalGatewayNamespace .Release.Namespace) }}
    {{- $_ := set $gatewayConfig.tls "secretNamespace" $globalGatewayNamespace }}
  {{- end }}
  {{- $domain := trim (default "" $gatewayConfig.domain) }}
  {{- $globalDomain := trim (default "" (index $globalGateway "domain")) }}
  {{- if and (eq $domain "") (eq (include "sdcommon.globalGatewayEnabled" .) "true") (ne $globalDomain "") }}
    {{- $domain = $globalDomain }}
  {{- end }}
  {{- if eq $domain "" }}
    {{- fail "gateway.http.domain must be set to create the Gateway certificate." -}}
  {{- end }}
  {{- $useGlobalSecret := eq (include "sdcommon.usesGlobalCertSecret" (dict "context" .)) "true" }}
  {{- $tlsSecret := default "" $gatewayConfig.tls.secretName }}
  {{- if and (eq (trim $tlsSecret) "") $globalGatewayExternal }}
    {{- $tlsSecret = $globalGatewayTlsSecret }}
    {{- if eq (trim $tlsSecret) "" }}
      {{- $tlsSecret = $globalGatewaySparqlTlsSecret }}
    {{- end }}
  {{- end }}
  {{- if eq (trim $tlsSecret) "" }}
    {{- $_ := set $gatewayConfig.tls "secretName" (include "certIssuer.secretName" .) }}
    {{- $tlsSecret = $gatewayConfig.tls.secretName }}
  {{- end }}
  {{- $secretNamespace := default .Release.Namespace $gatewayConfig.tls.secretNamespace }}
  {{- if and (ne $secretNamespace .Release.Namespace) (not $issuer.clusterScoped) (ne $secretNamespace (include "sdcommon.certIssuerNamespace" .)) }}
    {{- fail "gateway.http.tls.secretNamespace outside the release namespace requires certIssuer.clusterScoped=true." -}}
  {{- end }}
  {{- $sparqlHost := printf "%s.%s" (default "sparql" $gatewayConfig.sparqlSubdomain) $domain }}
  {{- $dnsNames := list $sparqlHost }}
  {{- $biHost := "" }}
  {{- $renderSeparateBiCertificate := false }}
  {{- if eq (include "stardog.effectiveBiEnabled" .) "true" }}
    {{- $biHost = printf "%s.%s" (default "bi" $gatewayConfig.biSubdomain) $domain }}
    {{- $renderSeparateBiCertificate = and $globalGatewayExternal (not $useGlobalSecret) (ne $globalGatewayBiTlsSecret "") (ne $globalGatewayBiTlsSecret $tlsSecret) }}
    {{- if not $renderSeparateBiCertificate }}
      {{- $dnsNames = append $dnsNames $biHost }}
    {{- end }}
  {{- end }}
  {{- if and $useGlobalSecret (or $globalGatewayManaged $globalGatewayExternal) $launchpadEnabled }}
    {{- $launchpadHost := printf "%s.%s" "launchpad" $domain }}
    {{- $dnsNames = append $dnsNames $launchpadHost }}
  {{- end }}
  {{- if $useGlobalSecret }}
    {{- if eq (include "sdcommon.acmeHasDns01" .) "true" }}
      {{- $dnsNames = list (printf "*.%s" $domain) $domain }}
    {{- end }}
  {{- end }}
  {{- $certName := default (printf "%s-gateway-cert" (include "sdcommon.fullname" .)) $gatewayConfig.tls.certificateName }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ $certName }}
  namespace: {{ $secretNamespace }}
  labels:
{{ include "sdcommon.labels.standard" . | indent 4 }}
spec:
  secretName: {{ $tlsSecret }}
  issuerRef:
    name: {{ include "certIssuer.name" . }}
    kind: {{ include "certIssuer.kind" . }}
  dnsNames:
  {{- range $dnsNames }}
    - {{ . | quote }}
  {{- end }}
  {{- if $renderSeparateBiCertificate }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ printf "%s-bi-gateway-cert" (include "sdcommon.fullname" .) }}
  namespace: {{ $secretNamespace }}
  labels:
{{ include "sdcommon.labels.standard" . | indent 4 }}
spec:
  secretName: {{ $globalGatewayBiTlsSecret }}
  issuerRef:
    name: {{ include "certIssuer.name" . }}
    kind: {{ include "certIssuer.kind" . }}
  dnsNames:
    - {{ $biHost | quote }}
  {{- end }}
{{- end }}
