{{- $tmpDirPath := (include "sdcommon.tmpDirPath" .) | trim -}}
{{- $tmpDirLocal := eq ((include "sdcommon.tmpDirLocal" .) | trim) "true" -}}
{{- $zkService := include "stardog.zookeeperService" . | trim -}}
{{- $tlsSecretName := include "stardog.tlsKeystoreSecretName" . | trim -}}
{{- $sparqlTlsEnabled := eq (include "stardog.sparqlTlsEnabled" .) "true" -}}
{{- $sparqlTlsRequired := eq (include "stardog.sparqlTlsRequired" .) "true" -}}
{{- $biTlsEnabled := eq (include "stardog.biTlsEnabled" .) "true" -}}
{{- $anyTlsEnabled := or $sparqlTlsEnabled $biTlsEnabled -}}
{{- $truststoreEnabled := or .Values.tls.truststore.enabled $biTlsEnabled -}}
{{- $debugCfg := default (dict) .Values.debug -}}
{{- $debugSleep := int (default 0 (index $debugCfg "sleepOnFailureSeconds")) -}}
{{- $debugJavaSsl := or (eq (index $debugCfg "javaSsl") true) (eq (toString (index $debugCfg "javaSsl")) "true") -}}
{{- include "stardog.validateClusterConfig" . }}
{{- include "stardog.validateUpgradeConfig" . }}
{{- if and $sparqlTlsRequired (not $sparqlTlsEnabled) }}
  {{- fail "tls.sparql.required=true requires tls.sparql.enabled=true." -}}
{{- end }}
{{- if and $anyTlsEnabled .Values.tls.keystore.create (eq $tlsSecretName "") }}
  {{- fail "tls.sparql.enabled or tls.bi.enabled with tls.keystore.create=true requires a TLS secret (tls.*.secretName or certIssuer.secretName)." -}}
{{- end }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "sdcommon.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{ include "sdcommon.labels.standard" . | nindent 4 }}
spec:
  selector:
    matchLabels:
    {{ include "sdcommon.labels.selector" . | nindent 6 }}
      app: {{ include "sdcommon.fullname" . }}
  serviceName: {{ include "sdcommon.fullname" . }}
  replicas: {{ .Values.cluster.replicaCount }}
  podManagementPolicy: {{ .Values.podManagementPolicy }}
  template:
    metadata:
      labels:
        {{ include "sdcommon.labels.standard" . | nindent 8 }}
        app: {{ include "sdcommon.fullname" . }}
        stardog.com/deployname: {{ .Release.Name }}
        stardog.com/resource-type: cluster-node
      annotations:
        checksum/config: {{ include "stardog.configmapChecksum" . | default (randAlphaNum 8) }}
        checksum/secret: {{ include "stardog.secretChecksum" . | default (randAlphaNum 8) }}
    spec:
      serviceAccountName: {{ include "stardog.serviceAccountName" . }}
      {{- include "sdcommon.ensureSecretExists" (dict "context" $ "name" "stardog-license" "namespace" .Release.Namespace) }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      {{- with .Values.affinity }}
      affinity:
{{ toYaml . | indent 8 }}
      {{- else }}
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app: {{ include "sdcommon.fullname" . }}
            topologyKey: kubernetes.io/hostname
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: {{ include "sdcommon.fullname" . }}
              topologyKey: topology.kubernetes.io/zone
      {{- end }}
      initContainers:
      - name: pre-start-hook
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        securityContext:
          {{- toYaml .Values.containerSecurityContext | nindent 12 }}
        resources:
          requests:
            memory: 250Mi
            cpu: 300m
          limits:
            memory: 250Mi
            cpu: 300m
        env:
          - name: ZK_MAX_ATTEMPTS
            value: "{{ .Values.waitForStartSeconds }}"
          - name: ZK_SERVICE
            value: "{{ $zkService }}"
          - name: KEYSTORE_PASS
            value: "{{ .Values.tls.keystore.pass  }}"
          - name: KEYSTORE_NAME
            value: "{{ .Values.tls.keystore.name  }}"
          {{- if $truststoreEnabled }}
          - name: TRUSTSTORE_ENABLED
            value: "true"
          - name: TRUSTSTORE_NAME
            value: "{{ default "stardog-truststore.p12" .Values.tls.truststore.name }}"
          - name: TRUSTSTORE_PASS
            value: "{{ default .Values.tls.keystore.pass .Values.tls.truststore.pass }}"
          - name: TRUSTSTORE_SOURCE_PASS
            value: "{{ default "changeit" .Values.tls.truststore.sourcePass }}"
          {{- if ne .Values.tls.truststore.caSecretName "" }}
          - name: TRUSTSTORE_CA_PATH
            value: "/var/opt/stardog/ca/{{ .Values.tls.truststore.caSecretKey }}"
          {{- end }}
          {{- end }}
          - name: STARDOG_HOME
            value: "{{ .Values.stardogHome }}"
          {{- if $anyTlsEnabled }}
          - name: TLS_CERT_PATH
            value: "/var/opt/stardog/ssl/tls.crt"
          - name: TLS_KEY_PATH
            value: "/var/opt/stardog/ssl/tls.key"
          - name: TLS_MAX_ATTEMPTS
            value: "{{ .Values.tls.waitForSecretSeconds }}"
          {{- end }}
        command:
        - /bin/bash
        - -c
        - |
          {{- .Files.Get "files/pre-hook-script.sh" | indent 10 }}
          {{- if and $anyTlsEnabled  .Values.tls.keystore.create }}
          waitForTlsSecret "$TLS_CERT_PATH" "$TLS_KEY_PATH" "$TLS_MAX_ATTEMPTS" || exit 1
          cd ${STARDOG_HOME}
          generateKeystore "$KEYSTORE_NAME" "$KEYSTORE_PASS"
          {{- end }}
          {{- if $truststoreEnabled }}
          generateTruststore "$TRUSTSTORE_NAME" "$TRUSTSTORE_PASS" "$TRUSTSTORE_SOURCE_PASS" "${TRUSTSTORE_CA_PATH:-}"
          {{- end }}
          {{- if .Values.cluster.enabled }}
          checkZKReadiness "${ZK_SERVICE}" "${ZK_MAX_ATTEMPTS}"
          {{- end }}
        {{- if $anyTlsEnabled }}
        volumeMounts:
          - name: stardog-keystore
            mountPath: "/var/opt/stardog/keystore"
          {{- if ne $tlsSecretName "" }}
          - name: stardog-tls
            mountPath: "/var/opt/stardog/ssl"
          {{- end }}
          {{- if and $truststoreEnabled (ne .Values.tls.truststore.caSecretName "") }}
          - name: stardog-truststore-ca
            mountPath: "/var/opt/stardog/ca"
            readOnly: true
          {{- end }}
        {{- end }}
      containers:
      - name: {{ include "sdcommon.fullname" . }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        securityContext:
          {{- toYaml .Values.containerSecurityContext | nindent 12 }}
        ports:
        - containerPort: {{ .Values.ports.server }}
          name: server
        {{- if eq (include "stardog.effectiveBiEnabled" .) "true" }}
        - containerPort: {{ .Values.ports.sql }}
          name: sql
        {{- end }}
        {{- with .Values.resources }}
        resources:
          {{- toYaml . | nindent 10}}
        {{- end }}
        volumeMounts:
{{ include "sdcommon.stardogBaseVolumeMounts" (dict "home" .Values.stardogHome "fullname" (include "sdcommon.fullname" .) "pvcName" (include "sdcommon.pvcName" (dict "context" . "chart" "stardog" "withRelease" false)) "tmpDirLocal" $tmpDirLocal "tmpDirPath" $tmpDirPath "propertiesPath" "/etc/stardog-conf/stardog.properties" "logPath" "/var/opt/stardog/log4j2.xml") | indent 8 }}
        - name: {{ include "sdcommon.fullname" . }}-password
          mountPath: /etc/stardog-password
          readOnly: true
        {{- if and .Values.backup.enabled }}
        {{- if or .Values.backup.location.azure.enabled .Values.backup.location.persistentVolume.enabled }}
        - name: {{ include "sdcommon.fullname" . }}-backup
          mountPath: /var/opt/stardog/backups
          readOnly: false
        {{- end }}
        {{- end }}
        {{- if .Values.jwtConfig.enabled }}
        - name: {{ include "sdcommon.fullname" . }}-jwt
          mountPath: /var/opt/stardog/jwt.yaml
          subPath: jwt.yaml
          readOnly: true
        {{- end }}
        {{- if $anyTlsEnabled }}
        - name: stardog-keystore
          mountPath: "/var/opt/stardog/keystore"
          readOnly: true
        {{- if ne $tlsSecretName "" }}
        - name: stardog-tls
          mountPath: "/var/opt/stardog/ssl"
          readOnly: true
        {{- end }}
        {{- end }}
        workingDir: {{ .Values.stardogHome }}
        env:
        - name: PORT
          value: "{{ .Values.ports.server }}"
        {{- if $sparqlTlsEnabled }}
        - name: SSLPORT
          value: "{{ .Values.ports.serverssl }}"
        {{- end }}
        - name: STARDOG_HOME
          value: "{{ .Values.stardogHome }}"
        - name: STARDOG_LICENSE_PATH
          value: "/etc/stardog-license/stardog-license-key.bin"
        - name: STARDOG_PROPERTIES
          value: "{{ include "sdcommon.stardogPropertiesPath" . }}"
        - name: STARDOG_SERVER_JAVA_ARGS
          value: |
            {{- if $debugJavaSsl }}
            -Djavax.net.debug=ssl,handshake,record
            -Djava.security.debug=keystore,pkcs12,certpath
            {{- end }}
            {{- if $biTlsEnabled }}
            -Djavax.net.ssl.keyStore=/var/opt/stardog/keystore/{{ .Values.tls.keystore.name }}
            -Djavax.net.ssl.keyStorePassword={{ .Values.tls.keystore.pass }}
            -Djavax.net.ssl.keyStoreType=PKCS12
            {{- if $truststoreEnabled }}
            -Djavax.net.ssl.trustStore=/var/opt/stardog/keystore/{{ default "stardog-truststore.p12" .Values.tls.truststore.name }}
            -Djavax.net.ssl.trustStorePassword={{ default .Values.tls.keystore.pass .Values.tls.truststore.pass }}
            -Djavax.net.ssl.trustStoreType={{ default "PKCS12" .Values.tls.truststore.type }}
            {{- end }}
            {{- end }}
            -Djava.io.tmpdir={{ $tmpDirPath }}
            -XX:+HeapDumpOnOutOfMemoryError
            -Xms{{ .Values.jvm.minHeap }}
            -Xmx{{ .Values.jvm.maxHeap }}
            -XX:MaxDirectMemorySize={{ .Values.jvm.directMem }}
            {{ .Values.javaArgs }}
        - name: STARDOG_JAVA_ARGS
          value: "-Djava.io.tmpdir={{ $tmpDirPath }}"
        - name: STARDOG_TMP_PATH
          value: "{{ $tmpDirPath }}"
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: RELEASE_NAME
          value: {{ .Release.Name }}
        - name: BACKUP_LOCATION
          value: >-
            {{- if .Values.backup.location.persistentVolume.enabled }}
            {{ .Values.backup.location.persistentVolume.backupDir }}
            {{- else if .Values.backup.location.azure.enabled }}
            {{ .Values.backup.location.azure.backupDir }}
            {{- end }}
        - name: LICENSE_NAME
          value: {{ .Release.Namespace }}
        - name: PATH
          value: "/opt/stardog/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
        {{- range $key, $value := .Values.environmentVariables }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        command:
        - /bin/bash
        - -c
        - |
          set -ex
          {{ .Files.Get "files/utils.sh" | indent 10 }}
          make_temp ${STARDOG_TMP_PATH}
          SRC_PROPS=/etc/stardog-conf/stardog.properties
          if [ -f "${SRC_PROPS}" ]; then
            SRC_REAL=$(readlink -f "${SRC_PROPS}" 2>/dev/null || echo "${SRC_PROPS}")
            DEST_REAL=$(readlink -f "${STARDOG_PROPERTIES}" 2>/dev/null || echo "${STARDOG_PROPERTIES}")
            if [ "${SRC_REAL}" != "${DEST_REAL}" ]; then
              cp "${SRC_PROPS}" "${STARDOG_PROPERTIES}"
            fi
          fi
          mkdir -p ${DJL_CACHE_DIR}
          ln -sfn /var/opt/djl/pytorch ${DJL_CACHE_DIR}/pytorch
          {{- if .Values.backup.enabled }}
          echo "backup.location=${STARDOG_HOME}/backups/${BACKUP_LOCATION}/${RELEASE_NAME}/${NODE_NAME}" >> ${STARDOG_PROPERTIES}
          {{- end }}
          set +e
          {{- if $sparqlTlsEnabled }}
          /opt/stardog/bin/stardog-admin server start --foreground --port ${PORT} --ssl-port ${SSLPORT} --home ${STARDOG_HOME} --enable-ssl{{ if $sparqlTlsRequired }} --require-ssl{{ end }}
          {{- else }}
          /opt/stardog/bin/stardog-admin server start --foreground --port ${PORT} --home ${STARDOG_HOME}
          {{- end }}
          rc=$?
          set -e
          if [ $rc -ne 0 ]; then
            if [ {{ $debugSleep }} -gt 0 ]; then
              echo "Stardog exited with code ${rc}; sleeping {{ $debugSleep }}s for troubleshooting"
              sleep {{ $debugSleep }}
            fi
            exit $rc
          fi
{{ include "sdcommon.stardogProbes" . | indent 8 }}
        lifecycle:
          preStop:
            exec:
              command:
              - /bin/bash
              - -c
              - |
                /opt/stardog/bin/stardog-admin server stop -u admin -p $(cat /etc/stardog-password/adminpw)
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- if and (hasKey .Values "image") .Values.image.pullSecrets }}
      imagePullSecrets:
        {{ toYaml .Values.image.pullSecrets }}
      {{- end }}
      {{- if and (hasKey .Values "image") .Values.image.username .Values.image.password }}
      imagePullSecrets:
        - name: {{ .Release.Name }}-image-pull-secret
      {{- end }}
      volumes:
{{ include "sdcommon.stardogBaseVolumes" (dict "fullname" (include "sdcommon.fullname" .) "tmpDirLocal" $tmpDirLocal) | indent 6 }}
      - name: stardog-keystore
      {{- if ( ne .Values.tls.keystore.existingSecret "") }}
        secret:
          secretName: {{ .Values.tls.keystore.existingSecret }}
      {{ else }}
        emptyDir: {}
      {{ end }}
      {{- if and $anyTlsEnabled (ne $tlsSecretName "") }}
      - name: stardog-tls
        secret:
          secretName: {{ $tlsSecretName }}
          optional: true
      {{- end }}
      {{- if and .Values.tls.truststore.enabled (ne .Values.tls.truststore.caSecretName "") }}
      - name: stardog-truststore-ca
        secret:
          secretName: {{ .Values.tls.truststore.caSecretName }}
      {{- end }}
      - name: {{ include "sdcommon.fullname" . }}-password
        secret:
          secretName: {{ include "sdcommon.fullname" . }}-password
          items:
            - key: password
              path: adminpw
              mode: 444
      {{- if .Values.jwtConfig.enabled }}
      - name: {{ include "sdcommon.fullname" . }}-jwt
        configMap:
          name: {{ include "sdcommon.fullname" . }}-jwt
          items:
            - key: jwt.yaml
              path: jwt.yaml
      {{- end }}
      {{- if .Values.backup.enabled }}
      {{- if .Values.backup.location.persistentVolume.enabled }}
      - name: {{ include "stardog.fullname" . }}-backup
        persistentVolumeClaim:
          claimName: {{ .Values.backup.location.persistentVolume.customPersitentVolumeClaim }}
      {{- else if .Values.backup.location.azure.enabled }}
      - name: {{ include "sdcommon.fullname" . }}-backup
        persistentVolumeClaim:
          claimName: {{ include "sdcommon.pvcName" (dict "context" . "chart" "stardog" "id" "backup-azure") }}
      {{- end }}
      {{- end }}
      {{ with include "sdcommon.podScheduling" . }}
{{ . | nindent 6 }}
      {{ end }}
  volumeClaimTemplates:
  - metadata:
      name: {{ include "sdcommon.pvcName" (dict "context" . "chart" "stardog" "withRelease" false) }}
      {{- with .Values.persistence.annotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      accessModes: [ "ReadWriteOnce" ]
      {{- with include "sdcommon.storageClassBlock" (dict "value" .Values.persistence.storageClass "context" $) }}
      {{ . | nindent 6 }}
      {{- end }}
      resources:
        requests:
          storage: {{ .Values.persistence.size }}
