suite: License Secret Validation
values:
  - values/values-stardog.yaml
templates:
  - statefulset.yaml

tests:
  - it: fails when license secret missing
    set:
      global:
        __secretFixtures: []
    asserts:
      - failedTemplate:
          errorMessage: "Secret NAMESPACE/stardog-license not found. Please create it or choose an existing secret."
