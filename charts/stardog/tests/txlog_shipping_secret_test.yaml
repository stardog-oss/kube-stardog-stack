suite: Stardog TX Log Shipping Secrets
values:
  - values/values-stardog.yaml
templates:
  - secret.yaml

# Note on coverage: the chart-generated `<release>-stardog-txlog-credentials`
# Secret is gated on a `lookup` call (same idempotency pattern as the 
# backup credentials secret). `helm template` and `helm unittest` both run
# without an API server, so `lookup` returns an empty dict and the Secret
# never renders in test mode. The CronJob tests cover the fact that the
# shipping Pod references the correct Secret name; the rendering path itself
# is exercised only at `helm install` time, matching the existing pattern.

tests:
  - it: does not render an azure txlog secret when the feature is disabled
    asserts:
      - notEqual:
          path: metadata.name
          value: RELEASE-NAME-stardog-txlog-azure-secret

  - it: renders the azure txlog secret with account credentials when provided
    set:
      txLogShipping:
        enabled: true
        azure:
          container: my-container
          accountName: myaccount
          accountKey: mykey
    documentSelector:
      path: metadata.name
      value: RELEASE-NAME-stardog-txlog-azure-secret
    asserts:
      - equal:
          path: kind
          value: Secret
      - equal:
          path: data.accountname
          # "myaccount" -> base64
          value: bXlhY2NvdW50
      - equal:
          path: data.accountkey
          # "mykey" -> base64
          value: bXlrZXk=

  - it: skips the chart-generated azure txlog secret when azure.existingSecret is set
    set:
      txLogShipping:
        enabled: true
        azure:
          container: my-container
          existingSecret: my-azure-secret
          accountName: myaccount
          accountKey: mykey
    asserts:
      - notEqual:
          path: metadata.name
          value: RELEASE-NAME-stardog-txlog-azure-secret

  - it: skips the chart-generated azure txlog secret when accountName is empty
    set:
      txLogShipping:
        enabled: true
        azure:
          container: my-container
          accountName: ""
          accountKey: "somekey"
    asserts:
      - notEqual:
          path: metadata.name
          value: RELEASE-NAME-stardog-txlog-azure-secret

  - it: skips the chart-generated azure txlog secret when accountKey is empty
    set:
      txLogShipping:
        enabled: true
        azure:
          container: my-container
          accountName: "someaccount"
          accountKey: ""
    asserts:
      - notEqual:
          path: metadata.name
          value: RELEASE-NAME-stardog-txlog-azure-secret
