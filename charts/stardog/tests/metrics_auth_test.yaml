suite: Metrics Auth Secret
release:
  name: stardog
values:
  - values/values-stardog.yaml
templates:
  - metrics-secret.yaml

tests:
  - it: does not render secret when metrics disabled
    set:
      metrics:
        enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: does not render secret when auth type is none
    set:
      metrics:
        enabled: true
        auth:
          type: "none"
    asserts:
      - hasDocuments:
          count: 0

  - it: creates secret when basicAuth configured
    set:
      metrics:
        enabled: true
        auth:
          type: basicAuth
          basicAuth:
            username: prometheus
            password: secret123
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: stardog-metrics-auth
      - equal:
          path: data.username
          # base64("prometheus")
          value: cHJvbWV0aGV1cw==
      - equal:
          path: data.password
          # base64("secret123")
          value: c2VjcmV0MTIz

  - it: does not create secret when existingSecret is set
    set:
      metrics:
        enabled: true
        auth:
          type: basicAuth
          basicAuth:
            existingSecret: my-existing-secret
    asserts:
      - hasDocuments:
          count: 0
