suite: Stardog ServiceAccount
templates:
  - serviceaccount.yaml

tests:
  - it: renders service account with default name
    values:
      - values/values-stardog.yaml
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: stardog-RELEASE-NAME

  - it: applies custom annotations
    values:
      - values/values-stardog.yaml
    set:
      serviceAccount:
        annotations:
          azure.workload.identity/client-id: "1234"
    asserts:
      - equal:
          path: metadata.annotations["azure.workload.identity/client-id"]
          value: "1234"

  - it: skips ServiceAccount creation when disabled
    values:
      - values/values-stardog.yaml
    set:
      serviceAccount:
        create: false
    asserts:
      - hasDocuments:
          count: 0
