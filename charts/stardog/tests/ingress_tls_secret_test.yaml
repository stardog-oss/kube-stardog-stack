suite: Ingress TLS Secret Validation
values:
  - values/values-stardog.yaml
templates:
  - ingress.yaml

tests:
  - it: requires static TLS secret when cert issuer disabled
    set:
      ingress:
        enabled: true
        tls:
          enabled: true
        url: example.com
      certIssuer:
        enabled: false
    asserts:
      - failedTemplate:
          errorMessage: "ingress.tls.secretName must be set when certIssuer is disabled."

  - it: validates provided TLS secret exists
    set:
      ingress:
        enabled: true
        tls:
          enabled: true
          secretName: custom-tls
        url: example.com
      certIssuer:
        enabled: false
      global:
        __secretFixtures:
          - metadata:
              name: stardog-license
          - metadata:
              name: custom-tls
    asserts:
      - hasDocuments:
          count: 1
