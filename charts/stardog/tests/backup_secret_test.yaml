suite: Backup Credentials Secret Validation
values:
  - values/values-stardog.yaml
templates:
  - backup/job.yaml

tests:
  - it: fails when custom credentials secret is missing
    set:
      backup:
        enabled: true
        cronjob:
          enabled: true
        credentialsSecret: custom-backup-secret
    asserts:
      - failedTemplate:
          errorMessage: "Secret NAMESPACE/custom-backup-secret not found. Please create it or choose an existing secret."

  - it: renders when custom credentials secret exists
    set:
      backup:
        enabled: true
        cronjob:
          enabled: true
        credentialsSecret: custom-backup-secret
      global:
        __secretFixtures:
          - metadata:
              name: stardog-license
          - metadata:
              name: custom-backup-secret
    asserts:
      - hasDocuments:
          count: 1
