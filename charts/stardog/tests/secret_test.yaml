suite: Validate Secrets
templates:
- secret.yaml
tests:
# Test for Stardog Image Pull Secret
- it: should create a Stardog image pull secret when credentials are provided
  values:
    - values/values-stardog.yaml
  set:
    image:
      username: "stardog_user"
      password: "stardog_pass"
  documentSelector:
    path: metadata.name
    value: RELEASE-NAME-image-pull-secret
  asserts:
  - isKind:
      of: Secret
  - equal:
      path: metadata.name
      value: RELEASE-NAME-image-pull-secret
  - equal:
      path: type
      value: kubernetes.io/dockerconfigjson

# Test for Stardog Admin Password Secret
- it: should create a Stardog password secret when Stardog is enabled
  values:
    - values/values-stardog.yaml
  set:
    admin:
      password: "admin123"
  documentSelector:
    path: metadata.name
    value: stardog-RELEASE-NAME-password
  asserts:
  - isKind:
      of: Secret
  - equal:
      path: metadata.name
      value: stardog-RELEASE-NAME-password
  - equal:
      path: type
      value: Opaque

- it: renders Azure backup secret when credentials provided
  values:
    - values/values-stardog.yaml
  set:
    backup:
      enabled: true
      location:
        azure:
          enabled: true
          accountName: mystorage
          accountKey: verysecret
  documentSelector:
    path: metadata.name
    value: RELEASE-NAME-backup-azure-secret
  asserts:
    - equal:
        path: data.accountname
        value: bXlzdG9yYWdl
    - equal:
        path: data.accountkey
        value: dmVyeXNlY3JldA==

- it: renders backup credentials secret when not provided externally
  values:
    - values/values-stardog.yaml
  set:
    backup:
      enabled: true
      credentials:
        username: backup_user
        password: changeme
  documentSelector:
    path: metadata.name
    value: stardog-RELEASE-NAME-backup-credentials
  asserts:
    - equal:
        path: data.username
        value: YmFja3VwX3VzZXI=
    - equal:
        path: data.password
        value: Y2hhbmdlbWU=

- it: renders S3 backup secret when location enabled
  values:
    - values/values-stardog.yaml
  set:
    backup:
      enabled: true
      location:
        s3:
          enabled: true
          bucketName: my-bucket
          region: us-east-1
          accessKey: access
          secretKey: secret
  documentSelector:
    path: metadata.name
    value: RELEASE-NAME-backup-s3-secret
  asserts:
    - equal:
        path: data.bucketName
        value: bXktYnVja2V0
    - equal:
        path: data.region
        value: dXMtZWFzdC0x
    - equal:
        path: data.accessKey
        value: YWNjZXNz
    - equal:
        path: data.secretKey
        value: c2VjcmV0
