suite: Validate Services
templates:
- service.yaml
tests:
# Test for Stardog Service
- it: should create a Stardog service when Stardog is enabled
  values:
    - values/values-stardog.yaml
  set:
    bi:
      enabled: true
    global:
      bi:
        enabled: true
    ports:
      server: "5820"
      sql: "5432"
    service:
      type: LoadBalancer
      loadBalancerIP: "192.168.1.1"
      annotations:
        "service.beta.kubernetes.io/aws-load-balancer-type": "nlb"
  documentSelector:
    path: metadata.name
    value: stardog-RELEASE-NAME
  asserts:
  - isKind:
      of: Service
  - equal:
      path: metadata.name
      value: stardog-RELEASE-NAME
  - equal:
      path: spec.ports[0].port
      value: 5820
  - equal:
      path: spec.ports[1].port
      value: 5432
  - equal:
      path: spec.type
      value: LoadBalancer

- it: uses global BI toggle for SQL port and service
  values:
    - values/values-stardog.yaml
  set:
    global:
      bi:
        enabled: true
    bi:
      enabled: false
      service:
        enabled: true
        type: ClusterIP
    ports:
      server: "5820"
      sql: "5806"
  asserts:
  - hasDocuments:
      count: 2
  - documentIndex: 0
    equal:
      path: spec.ports[1].port
      value: 5806
  - documentIndex: 1
    equal:
      path: metadata.name
      value: stardog-RELEASE-NAME-sql
