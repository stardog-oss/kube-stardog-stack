{{- $globalGatewayEnabled := eq (include "sdcommon.globalGatewayEnabled" .) "true" -}}
{{- if $globalGatewayEnabled }}
  {{- $globalGateway := default (dict) .Values.global.gateway }}
  {{- $domain := trim (default "" (index $globalGateway "domain")) }}
  {{- $tls := default (dict) (index $globalGateway "tls") }}
  {{- $tlsEnabled := default true (index $tls "enabled") }}
  {{- $bootstrap := default (dict) (index $tls "bootstrap") }}
  {{- $bootstrapEnabled := default true (index $bootstrap "enabled") }}
  {{- $issuer := (include "sdcommon.effectiveCertIssuer" . | fromYaml) }}
  {{- if and $tlsEnabled $bootstrapEnabled $issuer.enabled (eq (default "acme" $issuer.type) "acme") }}
    {{- $gatewayNamespace := include "sdcommon.globalGatewayNamespace" . }}
    {{- $sharedSecret := trim (default "" (index $tls "secretName")) }}
    {{- $sparqlSecret := trim (default (printf "sparql-%s-tls" .Release.Name) (index $tls "sparqlSecretName")) }}
    {{- $launchpadSecret := trim (default (printf "launchpad-%s-tls" .Release.Name) (index $tls "launchpadSecretName")) }}
    {{- $stardogEnabled := false }}
    {{- if and (hasKey .Values "global") (hasKey .Values.global "stardog") (hasKey .Values.global.stardog "enabled") -}}
      {{- $raw := index .Values.global.stardog "enabled" -}}
      {{- $stardogEnabled = or (eq $raw true) (eq (toString $raw) "true") -}}
    {{- end -}}
    {{- $launchpadEnabled := false }}
    {{- if and (hasKey .Values "global") (hasKey .Values.global "launchpad") (hasKey .Values.global.launchpad "enabled") -}}
      {{- $raw := index .Values.global.launchpad "enabled" -}}
      {{- $launchpadEnabled = or (eq $raw true) (eq (toString $raw) "true") -}}
    {{- end -}}
    {{- $entries := list }}
    {{- if ne $sharedSecret "" }}
      {{- $dnsNames := list }}
      {{- if $stardogEnabled }}
        {{- $dnsNames = append $dnsNames (printf "sparql.%s" $domain) }}
      {{- end }}
      {{- if $launchpadEnabled }}
        {{- $dnsNames = append $dnsNames (printf "launchpad.%s" $domain) }}
      {{- end }}
      {{- if not (gt (len $dnsNames) 0) }}
        {{- $dnsNames = list (printf "gateway.%s" $domain) }}
      {{- end }}
      {{- $entries = list (dict "name" $sharedSecret "dnsNames" $dnsNames "cn" (index $dnsNames 0)) }}
    {{- else }}
      {{- if $stardogEnabled }}
        {{- $dnsNames := list (printf "sparql.%s" $domain) }}
        {{- $entries = append $entries (dict "name" $sparqlSecret "dnsNames" $dnsNames "cn" (index $dnsNames 0)) }}
      {{- end }}
      {{- if $launchpadEnabled }}
        {{- $dnsNames := list (printf "launchpad.%s" $domain) }}
        {{- $entries = append $entries (dict "name" $launchpadSecret "dnsNames" $dnsNames "cn" (index $dnsNames 0)) }}
      {{- end }}
    {{- end }}
    {{- range $entry := $entries }}
      {{- if not (lookup "v1" "Secret" $gatewayNamespace $entry.name) }}
        {{- $cert := genSelfSignedCert $entry.cn nil $entry.dnsNames 365 }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $entry.name }}
  namespace: {{ $gatewayNamespace }}
  labels:
{{ include "sdcommon.labels.standard" $ | indent 4 }}
  annotations:
    stardog.com/bootstrap-cert: "true"
type: kubernetes.io/tls
data:
  tls.crt: {{ $cert.Cert | b64enc }}
  tls.key: {{ $cert.Key | b64enc }}
      {{- end }}
    {{- end }}
  {{- end }}
{{- end }}
