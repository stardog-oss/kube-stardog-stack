name: Helm Validate (reusable)

on:
  workflow_call:
    inputs:
      charts:
        description: 'JSON array of chart paths'
        required: true
        type: string
        default: '["charts/stardog","charts/zookeeper","charts/launchpad","charts/gateway","charts/voicebox","charts/cachetarget","."]'
      helm_version:
        required: false
        type: string
        default: 'v3.19.4'
      unittest_flags:
        required: false
        type: string
        default: '--strict'
      add_repos:
        description: 'Optional newline-separated "name url" pairs'
        required: false
        type: string
        default: ''
      version_check_mode:
        description: 'none | release-tag'
        required: false
        type: string
        default: 'none'

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        chart: ${{ fromJSON(inputs.charts) }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: azure/setup-helm@v5
        with:
          version: ${{ inputs.helm_version }}
      - name: Validate changelog entries and release versioning
        shell: bash
        env:
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.sha }}
          CURRENT_REF_NAME: ${{ github.ref_name }}
          VERSION_CHECK_MODE: ${{ inputs.version_check_mode }}
        run: |
          set -euo pipefail

          echo "Checking CHANGELOG entries for all charts..."
          while read -r chart_yaml; do
            chart_dir="$(dirname "$chart_yaml")"
            if [[ "$chart_dir" == "." ]]; then
              changelog="CHANGELOG.md"
            else
              changelog="${chart_dir}/CHANGELOG.md"
            fi

            if [[ ! -f "$changelog" ]]; then
              echo "Missing CHANGELOG: $changelog"
              exit 1
            fi

            version="$(awk '/^version:/{print $2; exit}' "$chart_yaml" | sed -E 's/^v//')"
            if [[ -z "$version" ]]; then
              echo "Missing version in $chart_yaml"
              exit 1
            fi

            if ! grep -Eq "^##[[:space:]]+\\[?${version}\\]?([[:space:]]|$)" "$changelog"; then
              echo "CHANGELOG entry missing: $changelog (version ${version})"
              exit 1
            fi
          done < <(find . -maxdepth 3 -name Chart.yaml -print | sort)

          if [[ "${VERSION_CHECK_MODE}" != "release-tag" ]]; then
            echo "Skipping release version comparison (mode: ${VERSION_CHECK_MODE})."
            exit 0
          fi

          if [[ ! "${CURRENT_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag validation requires github.ref_name to match vX.Y.Z."
            echo "Got: ${CURRENT_REF_NAME}"
            exit 1
          fi

          expected_umbrella="${CURRENT_REF_NAME#v}"
          curr_umbrella="$(awk '/^version:/{print $2; exit}' Chart.yaml | sed -E 's/^v//')"
          if [[ "${curr_umbrella}" != "${expected_umbrella}" ]]; then
            echo "Umbrella Chart.yaml version must match the release tag."
            echo "Tag: ${CURRENT_REF_NAME}"
            echo "Umbrella version: ${curr_umbrella}"
            exit 1
          fi

          previous_tag=""
          while read -r tag; do
            [[ -z "${tag}" ]] && continue
            if [[ "${tag}" != "${CURRENT_REF_NAME}" ]]; then
              previous_tag="${tag}"
              break
            fi
          done < <(git tag --list 'v*' --sort=-version:refname)

          if [[ -z "${previous_tag}" ]]; then
            echo "No previous release tag found. Skipping previous-release comparison."
            exit 0
          fi

          echo "Comparing chart versions against previous release tag: ${previous_tag}"
          release_errors=0
          while read -r chart_yaml; do
            [[ -z "${chart_yaml}" ]] && continue
            chart_dir="$(dirname "${chart_yaml}")"
            curr_ver="$(awk '/^version:/{print $2; exit}' "${chart_yaml}" | sed -E 's/^v//')"
            prev_ver="$(git show "${previous_tag}:${chart_yaml}" 2>/dev/null | awk '/^version:/{print $2; exit}' | sed -E 's/^v//' || true)"

            chart_changed=false
            if [[ "${chart_dir}" == "." ]]; then
              if git diff --name-only "${previous_tag}" "${AFTER}" -- . \
                ':(exclude).git' \
                ':(exclude).git/**' \
                ':(exclude).gitignore' \
                ':(exclude).DS_Store' \
                ':(exclude).idea/**' \
                ':(exclude).vscode/**' \
                ':(exclude).github/**' \
                ':(exclude)tests/**' \
                ':(exclude)charts/*/tests/**' \
                ':(exclude)scripts/**' \
                ':(exclude)*.tgz' \
                ':(exclude)*.tar.gz' \
                ':(exclude)node_modules/**' \
                ':(exclude)venv/**' \
                ':(exclude).env*' \
                ':(exclude)README_hook.md' | grep -q .; then
                chart_changed=true
              fi
            else
              if git diff --name-only "${previous_tag}" "${AFTER}" -- "${chart_dir}/" | grep -q .; then
                chart_changed=true
              fi
            fi

            if [[ "${chart_changed}" != "true" ]]; then
              continue
            fi

            if [[ -z "${prev_ver}" ]]; then
              echo "Detected new chart or no previous version at ${previous_tag}: ${chart_yaml}"
              continue
            fi

            if [[ "${prev_ver}" == "${curr_ver}" ]]; then
              echo "Changed chart content requires a version bump before tagging a release: ${chart_yaml} (${curr_ver})"
              release_errors=1
            fi
          done < <(find . -maxdepth 3 -name Chart.yaml -print | sort)

          if [[ "${release_errors}" -ne 0 ]]; then
            exit 1
          fi
      - name: Install helm-unittest
        run: helm plugin install https://github.com/helm-unittest/helm-unittest --version v1.0.3
      - name: Add extra Helm repos (optional)
        if: ${{ inputs.add_repos != '' }}
        shell: bash
        run: |
          set -euo pipefail
          while read -r line; do
            [ -z "$line" ] && continue
            name=$(echo "$line" | awk '{print $1}')
            url=$(echo "$line" | awk '{print $2}')
            helm repo add "$name" "$url"
          done <<< "${{ inputs.add_repos }}"
          helm repo update
      - name: Build dependencies
        working-directory: ${{ matrix.chart }}
        run: helm dependency build
      - name: Lint
        working-directory: ${{ matrix.chart }}
        run: helm lint . -f "$GITHUB_WORKSPACE/values.skip-secret-validation.yaml"
      - name: Template dry-run
        working-directory: ${{ matrix.chart }}
        run: helm template unittest "$PWD" --dry-run -f "$GITHUB_WORKSPACE/values.skip-secret-validation.yaml"
      - name: Run unit tests
        if: ${{ matrix.chart != '.' }}
        working-directory: ${{ matrix.chart }}
        run: helm unittest ${{ inputs.unittest_flags }} .
      - name: Run notes unit tests
        if: ${{ matrix.chart == 'charts/stardog' }}
        working-directory: ${{ matrix.chart }}
        run: helm unittest --with-subchart=false ${{ inputs.unittest_flags }} -f tests/notes_suite.yaml .
      - name: Run unit tests (skip subcharts)
        if: ${{ matrix.chart == '.' }}
        working-directory: ${{ matrix.chart }}
        run: helm unittest --with-subchart=false ${{ inputs.unittest_flags }} .
