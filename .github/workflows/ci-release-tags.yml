name: Release (tags)

on:
  push:
    tags:
      - 'v*'

jobs:
  tag-source:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Validate tag source
        shell: bash
        env:
          TAG_NAME: ${{ github.ref_name }}
          TAG_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          git fetch origin main --depth=1
          if [[ ! "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tags must match vX.Y.Z"
            echo "Got: $TAG_NAME"
            exit 1
          fi
          if ! git merge-base --is-ancestor "$TAG_SHA" origin/main; then
            echo "Release tags must point to a commit that is reachable from origin/main."
            exit 1
          fi

  validate:
    if: ${{ github.actor != 'github-actions[bot]' }}
    needs: tag-source
    uses: ./.github/workflows/helm-validate-reusable.yml
    with:
      charts: '["charts/stardog","charts/zookeeper","charts/launchpad","charts/gateway","charts/voicebox","charts/cachetarget","."]'
      version_check_mode: 'release-tag'

  release:
    if: ${{ github.actor != 'github-actions[bot]' }}
    needs: validate
    uses: ./.github/workflows/helm-github-release.yml
    permissions:
      contents: write
    secrets: inherit
    with:
      charts: '["charts/stardog","charts/zookeeper","charts/launchpad","charts/gateway","charts/voicebox","charts/cachetarget","."]'
      release_tag: ${{ github.ref_name }}
